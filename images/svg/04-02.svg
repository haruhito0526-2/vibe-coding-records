<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow42" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">BEFORE: BATON RELAY</text>
  <text x="80" y="112" font-weight="700" font-size="44" dominant-baseline="hanging">
    <tspan fill="#1f2937">フォームから入った情報が、</tspan><tspan fill="#b8413c">3〜4回バトンを渡して</tspan><tspan fill="#1f2937">やっとスプシに着く</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">CH.1 — OLD FLOW</text>
  <text x="1840" y="116" text-anchor="end" fill="#b8413c" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">FRAGILE</text>

  <!-- バトンリレーのフロー -->
  <g transform="translate(0, 280)">
    <!-- ステップ枠の共通設定 -->

    <!-- ステップ1: フォーム -->
    <g transform="translate(80, 100)">
      <rect x="0" y="0" width="280" height="200" rx="14" fill="#ffffff" stroke="#a8d4ee" stroke-width="2" filter="url(#softShadow42)"/>
      <rect x="0" y="0" width="280" height="44" rx="14" fill="#ecf2f7"/>
      <text x="140" y="22" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="16" letter-spacing="1.4">STEP 1</text>
      <text x="140" y="100" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="24">フォーム送信</text>
      <text x="140" y="138" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-weight="500" font-size="16">お客さんが入力して送信</text>
      <g transform="translate(110, 156)">
        <rect x="0" y="0" width="60" height="34" rx="6" fill="#3a7ba8"/>
        <text x="30" y="17" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="14">SEND</text>
      </g>
    </g>

    <!-- 矢印1→2 -->
    <g stroke="#5da8d4" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="370" y1="200" x2="438" y2="200"/>
      <polyline points="428,193 440,200 428,207"/>
    </g>

    <!-- ステップ2: 通知メール -->
    <g transform="translate(450, 100)">
      <rect x="0" y="0" width="280" height="200" rx="14" fill="#ffffff" stroke="#a8d4ee" stroke-width="2" filter="url(#softShadow42)"/>
      <rect x="0" y="0" width="280" height="44" rx="14" fill="#ecf2f7"/>
      <text x="140" y="22" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="16" letter-spacing="1.4">STEP 2</text>
      <text x="140" y="100" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="24">通知メール</text>
      <text x="140" y="138" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-weight="500" font-size="16">Gmailに届く</text>
      <text x="140" y="170" text-anchor="middle" dominant-baseline="central" font-size="22">📧</text>
    </g>

    <!-- 矢印2→3 -->
    <g stroke="#5da8d4" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="740" y1="200" x2="808" y2="200"/>
      <polyline points="798,193 810,200 798,207"/>
    </g>

    <!-- ステップ3: 自動処理 -->
    <g transform="translate(820, 100)">
      <rect x="0" y="0" width="280" height="200" rx="14" fill="#ffffff" stroke="#a8d4ee" stroke-width="2" filter="url(#softShadow42)"/>
      <rect x="0" y="0" width="280" height="44" rx="14" fill="#ecf2f7"/>
      <text x="140" y="22" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="16" letter-spacing="1.4">STEP 3</text>
      <text x="140" y="100" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="24">自動処理</text>
      <text x="140" y="138" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-weight="500" font-size="16">メールを読んで</text>
      <text x="140" y="166" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-weight="500" font-size="16">項目ごとに切り出す</text>
    </g>

    <!-- 矢印3→4 -->
    <g stroke="#5da8d4" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1110" y1="200" x2="1178" y2="200"/>
      <polyline points="1168,193 1180,200 1168,207"/>
    </g>

    <!-- ステップ4: スプレッドシート -->
    <g transform="translate(1190, 100)">
      <rect x="0" y="0" width="280" height="200" rx="14" fill="#ffffff" stroke="#a8d4ee" stroke-width="2" filter="url(#softShadow42)"/>
      <rect x="0" y="0" width="280" height="44" rx="14" fill="#ecf2f7"/>
      <text x="140" y="22" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="16" letter-spacing="1.4">STEP 4</text>
      <text x="140" y="100" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="24">スプレッドシート</text>
      <text x="140" y="138" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-weight="500" font-size="16">転記される</text>
      <text x="140" y="170" text-anchor="middle" dominant-baseline="central" font-size="22">📊</text>
    </g>

    <!-- 矢印4→5（赤強調） -->
    <g stroke="#b8413c" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1480" y1="200" x2="1548" y2="200"/>
      <polyline points="1538,193 1550,200 1538,207"/>
    </g>

    <!-- ステップ5: 人間が手で -->
    <g transform="translate(1560, 100)">
      <rect x="0" y="0" width="280" height="200" rx="14" fill="#ffffff" stroke="#b8413c" stroke-width="2.5" filter="url(#softShadow42)"/>
      <rect x="0" y="0" width="280" height="44" rx="14" fill="#fae5e3"/>
      <text x="140" y="22" text-anchor="middle" dominant-baseline="central" fill="#b8413c" font-weight="700" font-size="16" letter-spacing="1.4">STEP 5（手作業）</text>
      <text x="140" y="100" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="24">人間が手で</text>
      <text x="140" y="138" text-anchor="middle" dominant-baseline="central" fill="#b8413c" font-weight="600" font-size="16">メルマガサービスに</text>
      <text x="140" y="166" text-anchor="middle" dominant-baseline="central" fill="#b8413c" font-weight="600" font-size="16">手で登録</text>
    </g>

    <!-- 注釈：人間アイコン -->
    <g transform="translate(1670, 340)">
      <circle cx="0" cy="0" r="14" fill="#b8413c"/>
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="18" font-weight="700">!</text>
    </g>
  </g>

  <!-- 弱点リスト -->
  <g transform="translate(80, 720)">
    <rect x="0" y="0" width="1760" height="160" rx="14" fill="#fae5e3" opacity="0.6"/>
    <text x="40" y="40" fill="#b8413c" font-weight="700" font-size="22" letter-spacing="1.4" dominant-baseline="hanging">この動線の弱いところ</text>
    <g transform="translate(40, 80)">
      <g><circle cx="6" cy="14" r="5" fill="#b8413c"/><text x="22" y="14" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="18">ステップが多い（3〜4回バトン）</text></g>
      <g transform="translate(440, 0)"><circle cx="6" cy="14" r="5" fill="#b8413c"/><text x="22" y="14" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="18">途中の処理が壊れると止まる</text></g>
      <g transform="translate(900, 0)"><circle cx="6" cy="14" r="5" fill="#b8413c"/><text x="22" y="14" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="18">最後は結局、人間の手作業</text></g>
    </g>
  </g>

  <!-- フッター -->
  <g>
    <rect x="370" y="940" width="1180" height="56" rx="28" fill="#ffffff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="404" cy="968" r="6" fill="#f59e0b"/>
    <text x="428" y="968" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="22" letter-spacing="0.8">素直に作れば、もっと短くできるはず</text>
  </g>
</svg>
