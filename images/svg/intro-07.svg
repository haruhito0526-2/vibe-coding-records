<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">COMING UP</text>
  <text x="80" y="112" font-weight="700" font-size="48" dominant-baseline="hanging">
    <tspan fill="#1f2937">これから書く、</tspan><tspan fill="#3a7ba8">5本のシリーズ</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">VIBE-CODING ROADMAP</text>
  <text x="1840" y="116" text-anchor="end" fill="#3a7ba8" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">NEXT 5 EPISODES</text>

  <!-- カード1：会社WEB全面作り直し編（3話） -->
  <g>
    <rect x="80" y="280" width="320" height="640" rx="12" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow)"/>
    <rect x="80" y="274" width="320" height="640" rx="12" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>
    <rect x="195" y="324" width="90" height="90" rx="14" fill="#eaf4fb"/>
    <g transform="translate(220, 350)" stroke="#3a7ba8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="0" width="40" height="40" rx="3"/>
      <line x1="0" y1="10" x2="40" y2="10"/>
      <circle cx="6" cy="5" r="1.5" fill="#3a7ba8"/>
      <circle cx="12" cy="5" r="1.5" fill="#3a7ba8"/>
      <line x1="8" y1="20" x2="32" y2="20"/>
      <line x1="8" y1="28" x2="32" y2="28"/>
    </g>
    <text x="240" y="442" text-anchor="middle" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="1.2" dominant-baseline="hanging">EP.1 - 3</text>
    <text x="240" y="490" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">
      <tspan x="240" dy="0">会社のWebサイト</tspan>
      <tspan x="240" dy="36">全面作り直し</tspan>
    </text>
    <rect x="222" y="588" width="36" height="2" rx="1" fill="#a8d4ee"/>
    <text x="240" y="616" text-anchor="middle" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
      <tspan x="240" dy="0">事故・テーマ自作・</tspan>
      <tspan x="240" dy="32">200件変換・DB移行</tspan>
      <tspan x="240" dy="48" font-weight="600" fill="#3a7ba8">3週間の物語を3話に</tspan>
    </text>
    <circle cx="240" cy="274" r="30" fill="#a8d4ee"/>
    <text x="240" y="274" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="30">1</text>
  </g>

  <!-- カード2：PageSpeed Insights -->
  <g>
    <rect x="440" y="280" width="320" height="640" rx="12" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow)"/>
    <rect x="440" y="274" width="320" height="640" rx="12" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>
    <rect x="555" y="324" width="90" height="90" rx="14" fill="#eaf4fb"/>
    <g transform="translate(580, 350)" stroke="#3a7ba8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="20" cy="20" r="18"/>
      <path d="M20 8 L20 20 L28 26"/>
    </g>
    <text x="600" y="442" text-anchor="middle" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="1.2" dominant-baseline="hanging">EP.4</text>
    <text x="600" y="490" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">
      <tspan x="600" dy="0">PageSpeed</tspan>
      <tspan x="600" dy="36">ブラッシュアップ</tspan>
    </text>
    <rect x="582" y="588" width="36" height="2" rx="1" fill="#a8d4ee"/>
    <text x="600" y="616" text-anchor="middle" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
      <tspan x="600" dy="0">表示速度を満点近くまで</tspan>
      <tspan x="600" dy="32">上げた手順を全公開</tspan>
      <tspan x="600" dy="48" font-weight="600" fill="#3a7ba8">数値で語れる成果</tspan>
    </text>
    <circle cx="600" cy="274" r="30" fill="#a8d4ee"/>
    <text x="600" y="274" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="30">2</text>
  </g>

  <!-- カード3：メディア運営自動化 -->
  <g>
    <rect x="800" y="280" width="320" height="640" rx="12" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow)"/>
    <rect x="800" y="274" width="320" height="640" rx="12" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>
    <rect x="915" y="324" width="90" height="90" rx="14" fill="#eaf4fb"/>
    <g transform="translate(940, 350)" stroke="#3a7ba8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="6" width="36" height="28" rx="3"/>
      <line x1="2" y1="14" x2="38" y2="14"/>
      <line x1="8" y1="22" x2="32" y2="22"/>
      <line x1="8" y1="28" x2="24" y2="28"/>
    </g>
    <text x="960" y="442" text-anchor="middle" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="1.2" dominant-baseline="hanging">EP.5</text>
    <text x="960" y="490" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">
      <tspan x="960" dy="0">ブログ＆note</tspan>
      <tspan x="960" dy="36">執筆を自動化</tspan>
    </text>
    <rect x="942" y="588" width="36" height="2" rx="1" fill="#a8d4ee"/>
    <text x="960" y="616" text-anchor="middle" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
      <tspan x="960" dy="0">この記事の作り方も含めて、</tspan>
      <tspan x="960" dy="32">執筆〜公開までの仕組みを公開</tspan>
      <tspan x="960" dy="48" font-weight="600" fill="#3a7ba8">メタな実装事例</tspan>
    </text>
    <circle cx="960" cy="274" r="30" fill="#a8d4ee"/>
    <text x="960" y="274" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="30">3</text>
  </g>

  <!-- カード4：業務ツール14個 -->
  <g>
    <rect x="1160" y="280" width="320" height="640" rx="12" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow)"/>
    <rect x="1160" y="274" width="320" height="640" rx="12" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>
    <rect x="1275" y="324" width="90" height="90" rx="14" fill="#eaf4fb"/>
    <g transform="translate(1300, 350)" stroke="#3a7ba8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="0" width="14" height="14" rx="2"/>
      <rect x="22" y="0" width="14" height="14" rx="2"/>
      <rect x="0" y="22" width="14" height="14" rx="2"/>
      <rect x="22" y="22" width="14" height="14" rx="2"/>
    </g>
    <text x="1320" y="442" text-anchor="middle" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="1.2" dominant-baseline="hanging">EP.6 -</text>
    <text x="1320" y="490" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">
      <tspan x="1320" dy="0">業務ツール</tspan>
      <tspan x="1320" dy="36">14個を内製</tspan>
    </text>
    <rect x="1302" y="588" width="36" height="2" rx="1" fill="#a8d4ee"/>
    <text x="1320" y="616" text-anchor="middle" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
      <tspan x="1320" dy="0">サムネ生成、SVGメーカー、</tspan>
      <tspan x="1320" dy="32">メルマガ自動化など</tspan>
      <tspan x="1320" dy="48" font-weight="600" fill="#3a7ba8">それぞれ短編で</tspan>
    </text>
    <circle cx="1320" cy="274" r="30" fill="#a8d4ee"/>
    <text x="1320" y="274" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="30">4</text>
  </g>

  <!-- カード5：メルマガ配信システム（進行中、オレンジ） -->
  <g>
    <rect x="1520" y="280" width="320" height="640" rx="12" fill="#f59e0b" opacity="0.12" filter="url(#softShadow)"/>
    <rect x="1520" y="274" width="320" height="640" rx="12" fill="#ffffff" stroke="#fde6c1" stroke-width="2"/>
    <rect x="1635" y="324" width="90" height="90" rx="14" fill="#fef3e2"/>
    <g transform="translate(1660, 350)" stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="6" width="40" height="28" rx="3"/>
      <path d="M0 10 L20 22 L40 10"/>
    </g>
    <text x="1680" y="442" text-anchor="middle" fill="#f59e0b" font-weight="700" font-size="22" letter-spacing="1.2" dominant-baseline="hanging">EP.7+ / IN PROGRESS</text>
    <text x="1680" y="490" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">
      <tspan x="1680" dy="0">メルマガシステム</tspan>
      <tspan x="1680" dy="36">自前構築</tspan>
    </text>
    <rect x="1662" y="588" width="36" height="2" rx="1" fill="#f59e0b"/>
    <text x="1680" y="616" text-anchor="middle" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
      <tspan x="1680" dy="0">外部サービスから自前へ</tspan>
      <tspan x="1680" dy="32">途中経過と完成編で2本予定</tspan>
      <tspan x="1680" dy="48" font-weight="600" fill="#f59e0b">いま進行中</tspan>
    </text>
    <circle cx="1680" cy="274" r="30" fill="#f59e0b"/>
    <text x="1680" y="274" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="30">5</text>
  </g>

  <!-- 矢印 1->2->3->4 -->
  <g stroke="#a8d4ee" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="404" y1="594" x2="436" y2="594"/>
    <polyline points="430,587 442,594 430,601"/>
  </g>
  <g stroke="#a8d4ee" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="764" y1="594" x2="796" y2="594"/>
    <polyline points="790,587 802,594 790,601"/>
  </g>
  <g stroke="#a8d4ee" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="1124" y1="594" x2="1156" y2="594"/>
    <polyline points="1150,587 1162,594 1150,601"/>
  </g>
  <!-- 矢印 4->5 (オレンジで進行中強調) -->
  <g stroke="#f59e0b" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="1484" y1="594" x2="1516" y2="594"/>
    <polyline points="1510,587 1522,594 1510,601"/>
  </g>

  <!-- フッター：番外編予告 -->
  <g>
    <rect x="600" y="970" width="720" height="56" rx="28" fill="#ffffff" stroke="#d8e7f2" stroke-width="1.5"/>
    <circle cx="630" cy="998" r="5" fill="#5da8d4"/>
    <text x="652" y="998" dominant-baseline="central" fill="#3a7ba8" font-weight="600" font-size="22" letter-spacing="0.8">番外編：商用ツールを自前で再現してみたら...等を不定期で</text>
  </g>
</svg>
