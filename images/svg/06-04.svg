<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow64" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">CHAPTER 04 — THE GAPS</text>
  <text x="80" y="112" font-weight="700" font-size="44" dominant-baseline="hanging">
    <tspan fill="#1f2937">note取り込み用</tspan><tspan fill="#3a7ba8">XML</tspan><tspan fill="#1f2937">の、3つのクセ</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">VOL.6 — PIPELINE ②</text>
  <text x="1840" y="116" text-anchor="end" fill="#f59e0b" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">GAPS</text>

  <!-- 上段：原稿 → 変換ツール → note取り込み の流れ -->
  <g transform="translate(0, 240)">
    <!-- 原稿 -->
    <g transform="translate(120, 0)">
      <rect x="0" y="0" width="280" height="140" rx="14" fill="#fff" stroke="#a8d4ee" stroke-width="2.5"/>
      <text x="140" y="34" text-anchor="middle" fill="#3a7ba8" font-weight="700" font-size="18" letter-spacing="2">原稿</text>
      <text x="140" y="60" text-anchor="middle" fill="#6b7280" font-size="14">マークダウン</text>
      <line x1="40" y1="86" x2="240" y2="86" stroke="#5da8d4" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="40" y1="100" x2="220" y2="100" stroke="#5da8d4" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="40" y1="114" x2="240" y2="114" stroke="#5da8d4" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- 矢印 -->
    <g stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="420" y1="70" x2="540" y2="70"/>
      <polyline points="528,61 542,70 528,79"/>
    </g>

    <!-- 変換ツール（AI製） -->
    <g transform="translate(560, 0)">
      <rect x="0" y="0" width="280" height="140" rx="14" fill="#fef3e2" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8 4"/>
      <text x="140" y="34" text-anchor="middle" fill="#f59e0b" font-weight="700" font-size="18" letter-spacing="2">変換ツール</text>
      <text x="140" y="60" text-anchor="middle" fill="#6b7280" font-size="14">AIに作ってもらった</text>
      <!-- 歯車2つ -->
      <g transform="translate(100, 100)" fill="#f59e0b">
        <rect x="-3" y="-22" width="6" height="6"/>
        <rect x="-3" y="16" width="6" height="6"/>
        <rect x="-22" y="-3" width="6" height="6"/>
        <rect x="16" y="-3" width="6" height="6"/>
        <circle r="14" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
        <circle r="4" fill="#f59e0b"/>
      </g>
      <g transform="translate(180, 100)" fill="#f59e0b">
        <rect x="-3" y="-22" width="6" height="6"/>
        <rect x="-3" y="16" width="6" height="6"/>
        <rect x="-22" y="-3" width="6" height="6"/>
        <rect x="16" y="-3" width="6" height="6"/>
        <circle r="14" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
        <circle r="4" fill="#f59e0b"/>
      </g>
    </g>

    <!-- 矢印 -->
    <g stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="860" y1="70" x2="980" y2="70"/>
      <polyline points="968,61 982,70 968,79"/>
    </g>

    <!-- note取り込み用XML -->
    <g transform="translate(1000, 0)">
      <rect x="0" y="0" width="280" height="140" rx="14" fill="#fff" stroke="#3a7ba8" stroke-width="2.5"/>
      <text x="140" y="34" text-anchor="middle" fill="#3a7ba8" font-weight="700" font-size="18" letter-spacing="2">XML</text>
      <text x="140" y="60" text-anchor="middle" fill="#6b7280" font-size="14">note取り込み用</text>
      <text x="140" y="100" text-anchor="middle" fill="#3a7ba8" font-weight="700" font-size="22" letter-spacing="0">&lt;item&gt; ... &lt;/item&gt;</text>
    </g>

    <!-- noteアイコン -->
    <g transform="translate(1300, 0)">
      <text x="0" y="70" dominant-baseline="central" fill="#6b7280" font-size="32">→</text>
    </g>
    <g transform="translate(1360, 0)">
      <rect x="0" y="0" width="200" height="140" rx="14" fill="#ecf2f7" stroke="#3a7ba8" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" fill="#3a7ba8" font-weight="700" font-size="18" letter-spacing="2">note</text>
      <text x="100" y="62" text-anchor="middle" fill="#6b7280" font-size="13">取り込み</text>
      <line x1="30" y1="90" x2="170" y2="90" stroke="#a8d4ee" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="30" y1="104" x2="150" y2="104" stroke="#a8d4ee" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="30" y1="118" x2="170" y2="118" stroke="#a8d4ee" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- 中段：3つのクセ -->
  <g transform="translate(0, 460)">
    <text x="960" y="0" text-anchor="middle" fill="#6b7280" font-weight="700" font-size="20" letter-spacing="3" dominant-baseline="hanging">変換ツールが受け持っている、3つのクセ</text>

    <!-- クセ1：画像URL -->
    <g transform="translate(120, 60)">
      <rect x="0" y="0" width="540" height="280" rx="14" fill="#fff" stroke="#fde6c1" stroke-width="2"/>
      <rect x="0" y="0" width="540" height="48" rx="14" fill="#fef3e2"/>
      <rect x="0" y="34" width="540" height="14" fill="#fef3e2"/>
      <text x="30" y="24" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="14" letter-spacing="2">クセ 01</text>
      <text x="30" y="84" fill="#1f2937" font-weight="700" font-size="22" dominant-baseline="hanging">画像URL</text>

      <!-- Before -->
      <text x="30" y="130" fill="#6b7280" font-size="13" dominant-baseline="hanging">原稿の書き方（相対パス）</text>
      <rect x="30" y="150" width="480" height="32" rx="6" fill="#ecf2f7"/>
      <text x="44" y="166" dominant-baseline="central" fill="#6b7280" font-family="monospace" font-size="14">images/png/06-01.png</text>

      <!-- 矢印 -->
      <g transform="translate(270, 200)" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round">
        <line x1="0" y1="0" x2="0" y2="14"/>
        <polyline points="-6,8 0,14 6,8"/>
      </g>

      <!-- After -->
      <text x="30" y="222" fill="#3a7ba8" font-size="13" dominant-baseline="hanging">取り込み形（絶対URL）</text>
      <rect x="30" y="242" width="480" height="32" rx="6" fill="#fef3e2"/>
      <text x="44" y="258" dominant-baseline="central" fill="#1f2937" font-family="monospace" font-size="14">https://...github.io/.../06-01.png</text>
    </g>

    <!-- クセ2：強調・引用 -->
    <g transform="translate(690, 60)">
      <rect x="0" y="0" width="540" height="280" rx="14" fill="#fff" stroke="#fde6c1" stroke-width="2"/>
      <rect x="0" y="0" width="540" height="48" rx="14" fill="#fef3e2"/>
      <rect x="0" y="34" width="540" height="14" fill="#fef3e2"/>
      <text x="30" y="24" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="14" letter-spacing="2">クセ 02</text>
      <text x="30" y="84" fill="#1f2937" font-weight="700" font-size="22" dominant-baseline="hanging">強調・引用の崩れ</text>

      <!-- Before（崩れた表示） -->
      <text x="30" y="130" fill="#6b7280" font-size="13" dominant-baseline="hanging">そのまま変換すると</text>
      <rect x="30" y="150" width="480" height="32" rx="6" fill="#ecf2f7"/>
      <text x="44" y="166" dominant-baseline="central" fill="#6b7280" font-family="monospace" font-size="14">**ここを強調**  &gt; 引用ブロック</text>

      <!-- 矢印 -->
      <g transform="translate(270, 200)" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round">
        <line x1="0" y1="0" x2="0" y2="14"/>
        <polyline points="-6,8 0,14 6,8"/>
      </g>

      <!-- After -->
      <text x="30" y="222" fill="#3a7ba8" font-size="13" dominant-baseline="hanging">記号を整えて、note上で正しく表示</text>
      <rect x="30" y="242" width="480" height="32" rx="6" fill="#fef3e2"/>
      <text x="44" y="258" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="14">ここを強調 ／ 引用ブロック</text>
    </g>

    <!-- クセ3：タグ間の改行 -->
    <g transform="translate(1260, 60)">
      <rect x="0" y="0" width="540" height="280" rx="14" fill="#fff" stroke="#fde6c1" stroke-width="2"/>
      <rect x="0" y="0" width="540" height="48" rx="14" fill="#fef3e2"/>
      <rect x="0" y="34" width="540" height="14" fill="#fef3e2"/>
      <text x="30" y="24" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="14" letter-spacing="2">クセ 03</text>
      <text x="30" y="84" fill="#1f2937" font-weight="700" font-size="22" dominant-baseline="hanging">タグ間の余計な改行</text>

      <!-- Before -->
      <text x="30" y="130" fill="#6b7280" font-size="13" dominant-baseline="hanging">タグの間に改行が入ると</text>
      <rect x="30" y="150" width="480" height="32" rx="6" fill="#ecf2f7"/>
      <text x="44" y="166" dominant-baseline="central" fill="#6b7280" font-family="monospace" font-size="14">&lt;/p&gt; ↵ ↵ &lt;p&gt;  → 余計な空行</text>

      <!-- 矢印 -->
      <g transform="translate(270, 200)" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round">
        <line x1="0" y1="0" x2="0" y2="14"/>
        <polyline points="-6,8 0,14 6,8"/>
      </g>

      <!-- After -->
      <text x="30" y="222" fill="#3a7ba8" font-size="13" dominant-baseline="hanging">改行を整えて、間延びを防ぐ</text>
      <rect x="30" y="242" width="480" height="32" rx="6" fill="#fef3e2"/>
      <text x="44" y="258" dominant-baseline="central" fill="#1f2937" font-family="monospace" font-size="14">&lt;/p&gt;&lt;p&gt;  → 段落だけ揃う</text>
    </g>
  </g>

  <!-- フッター -->
  <g>
    <rect x="380" y="940" width="1160" height="56" rx="28" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="414" cy="968" r="6" fill="#f59e0b"/>
    <text x="438" y="968" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="22" letter-spacing="0.8">直すのではなく、直すツールをAIに作ってもらう（第3話と同じ発想）</text>
  </g>
</svg>
