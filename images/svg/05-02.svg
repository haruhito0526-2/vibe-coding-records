<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow52" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">CHAPTER 02 — IDENTITY</text>
  <text x="80" y="112" font-weight="700" font-size="44" dominant-baseline="hanging">
    <tspan fill="#1f2937">「自分の記事」と「コタツ記事」を、</tspan><tspan fill="#f59e0b">何が分けているか</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">VOL.5 — PIPELINE ①</text>
  <text x="1840" y="116" text-anchor="end" fill="#f59e0b" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">DIVIDE</text>

  <!-- 左：コタツ記事カード -->
  <g>
    <rect x="120" y="240" width="780" height="660" rx="14" fill="#3a7ba8" opacity="0.08" filter="url(#softShadow52)"/>
    <rect x="120" y="234" width="780" height="660" rx="14" fill="#fff" stroke="#ecf2f7" stroke-width="1.5"/>

    <rect x="150" y="270" width="220" height="36" rx="18" fill="#ecf2f7"/>
    <text x="260" y="288" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-weight="700" font-size="18" letter-spacing="1.5">コタツ記事</text>

    <text x="150" y="340" fill="#1f2937" font-weight="700" font-size="32" dominant-baseline="hanging">中身が、すかすか</text>
    <text x="150" y="394" fill="#6b7280" font-weight="500" font-size="20" dominant-baseline="hanging">どこかで読んだ話の寄せ集め</text>

    <!-- 中央の核（空っぽ） -->
    <g transform="translate(510, 580)">
      <circle r="120" fill="#ecf2f7" stroke="#a8d4ee" stroke-width="3" stroke-dasharray="8 6"/>
      <text y="-12" text-anchor="middle" dominant-baseline="central" fill="#a8d4ee" font-weight="600" font-size="22">考える</text>
      <text y="22" text-anchor="middle" dominant-baseline="central" fill="#a8d4ee" font-weight="600" font-size="22">体験の結果</text>
      <line x1="-90" y1="-90" x2="90" y2="90" stroke="#b8413c" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
      <line x1="90" y1="-90" x2="-90" y2="90" stroke="#b8413c" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    </g>

    <!-- 周辺の文章ブロック（薄い） -->
    <g opacity="0.5">
      <line x1="150" y1="780" x2="870" y2="780" stroke="#a8d4ee" stroke-width="3" stroke-linecap="round"/>
      <line x1="150" y1="800" x2="820" y2="800" stroke="#a8d4ee" stroke-width="3" stroke-linecap="round"/>
      <line x1="150" y1="820" x2="850" y2="820" stroke="#a8d4ee" stroke-width="3" stroke-linecap="round"/>
      <line x1="150" y1="840" x2="780" y2="840" stroke="#a8d4ee" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- 中央のVS -->
  <g transform="translate(960, 580)">
    <circle r="50" fill="#fff" stroke="#f59e0b" stroke-width="3"/>
    <text y="0" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="22" letter-spacing="2">VS</text>
  </g>

  <!-- 右：自分の記事カード -->
  <g>
    <rect x="1020" y="240" width="780" height="660" rx="14" fill="#f59e0b" opacity="0.12" filter="url(#softShadow52)"/>
    <rect x="1020" y="234" width="780" height="660" rx="14" fill="#fff" stroke="#fde6c1" stroke-width="2"/>

    <rect x="1050" y="270" width="220" height="36" rx="18" fill="#fef3e2"/>
    <text x="1160" y="288" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="18" letter-spacing="1.5">自分の記事</text>

    <text x="1050" y="340" fill="#1f2937" font-weight="700" font-size="32" dominant-baseline="hanging">核に「自分」が乗っている</text>
    <text x="1050" y="394" fill="#6b7280" font-weight="500" font-size="20" dominant-baseline="hanging">考えと体験の結果がアイデンティティに</text>

    <!-- 中央の核（光ってる） -->
    <g transform="translate(1410, 580)">
      <circle r="135" fill="#fef3e2" opacity="0.7"/>
      <circle r="120" fill="#f59e0b"/>
      <text y="-15" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="700" font-size="26">考える</text>
      <text y="22" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="700" font-size="26">体験の結果</text>
      <!-- 光線 -->
      <g stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.6">
        <line x1="0" y1="-180" x2="0" y2="-150"/>
        <line x1="0" y1="180" x2="0" y2="150"/>
        <line x1="-180" y1="0" x2="-150" y2="0"/>
        <line x1="180" y1="0" x2="150" y2="0"/>
        <line x1="-127" y1="-127" x2="-106" y2="-106"/>
        <line x1="127" y1="-127" x2="106" y2="-106"/>
        <line x1="-127" y1="127" x2="-106" y2="106"/>
        <line x1="127" y1="127" x2="106" y2="106"/>
      </g>
    </g>

    <!-- 周辺の文章ブロック（しっかり） -->
    <g>
      <line x1="1050" y1="780" x2="1770" y2="780" stroke="#3a7ba8" stroke-width="3" stroke-linecap="round"/>
      <line x1="1050" y1="800" x2="1720" y2="800" stroke="#3a7ba8" stroke-width="3" stroke-linecap="round"/>
      <line x1="1050" y1="820" x2="1750" y2="820" stroke="#3a7ba8" stroke-width="3" stroke-linecap="round"/>
      <line x1="1050" y1="840" x2="1680" y2="840" stroke="#3a7ba8" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="1050" y="870" fill="#6b7280" font-weight="500" font-size="16" dominant-baseline="hanging">↑ 周辺の段取りはAIに任せる</text>
  </g>

  <!-- フッター -->
  <g>
    <rect x="380" y="940" width="1160" height="56" rx="28" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="414" cy="968" r="6" fill="#f59e0b"/>
    <text x="438" y="968" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="22" letter-spacing="0.8">核に「考える」と「体験の結果」がある記事を、AIと一緒に作る</text>
  </g>
</svg>
