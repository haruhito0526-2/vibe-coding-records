<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#3a7ba8" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">SITE BREAKDOWN</text>
  <text x="80" y="112" font-weight="700" font-size="48" dominant-baseline="hanging">
    <tspan fill="#1f2937">壊れたWebサイトの</tspan><tspan fill="#3a7ba8">4重苦</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">WordPressバージョン誤更新後</text>
  <text x="1840" y="116" text-anchor="end" fill="#3a7ba8" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">技術的に詰み</text>

  <!-- カード1：サイトネットワーク -->
  <g>
    <rect x="160" y="240" width="760" height="350" rx="16" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow)"/>
    <rect x="160" y="234" width="760" height="350" rx="16" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>

    <!-- 番号バッジ -->
    <circle cx="220" cy="234" r="32" fill="#3a7ba8"/>
    <text x="220" y="234" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="32">1</text>

    <!-- アイコン枠 -->
    <rect x="200" y="290" width="100" height="100" rx="14" fill="#eaf4fb"/>
    <g transform="translate(225, 315)" stroke="#3a7ba8" stroke-width="3" stroke-linecap="round" fill="none">
      <rect x="0" y="0" width="50" height="50" rx="4"/>
      <line x1="0" y1="16" x2="50" y2="16"/>
      <line x1="16" y1="0" x2="16" y2="50"/>
      <line x1="34" y1="0" x2="34" y2="50"/>
      <line x1="0" y1="34" x2="50" y2="34"/>
    </g>

    <text x="340" y="290" fill="#1f2937" font-weight="700" font-size="36" dominant-baseline="hanging">サイトネットワーク</text>
    <text x="340" y="345" fill="#5da8d4" font-weight="600" font-size="20" letter-spacing="1" dominant-baseline="hanging">PROBLEM 1</text>
    <text x="340" y="395" fill="#4b5563" font-weight="400" font-size="22" dominant-baseline="hanging">
      <tspan x="340" dy="0">複数サイトが連結された構造で、</tspan>
      <tspan x="340" dy="32">テーマ（見た目）の更新ができない。</tspan>
      <tspan x="340" dy="32">どこを直せば直るのか分からない。</tspan>
    </text>
    <rect x="340" y="510" width="44" height="3" rx="1.5" fill="#3a7ba8"/>
    <text x="340" y="528" fill="#3a7ba8" font-weight="600" font-size="20" dominant-baseline="hanging">→ テーマ更新できず</text>
  </g>

  <!-- カード2：ショートコード地獄 -->
  <g>
    <rect x="1000" y="240" width="760" height="350" rx="16" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow)"/>
    <rect x="1000" y="234" width="760" height="350" rx="16" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>

    <circle cx="1060" cy="234" r="32" fill="#3a7ba8"/>
    <text x="1060" y="234" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="32">2</text>

    <rect x="1040" y="290" width="100" height="100" rx="14" fill="#eaf4fb"/>
    <g transform="translate(1060, 315)" stroke="#3a7ba8" stroke-width="3" stroke-linecap="round" fill="none" stroke-linejoin="round">
      <text x="20" y="35" font-family="monospace" font-size="32" font-weight="700" fill="#3a7ba8" stroke="none" text-anchor="middle">[ ]</text>
    </g>

    <text x="1180" y="290" fill="#1f2937" font-weight="700" font-size="36" dominant-baseline="hanging">ショートコード地獄</text>
    <text x="1180" y="345" fill="#5da8d4" font-weight="600" font-size="20" letter-spacing="1" dominant-baseline="hanging">PROBLEM 2</text>
    <text x="1180" y="395" fill="#4b5563" font-weight="400" font-size="22" dominant-baseline="hanging">
      <tspan x="1180" dy="0">プラグインが各ページに深く</tspan>
      <tspan x="1180" dy="32">食い込んでいて、外せない。</tspan>
      <tspan x="1180" dy="32">外そうとするとページが壊れる。</tspan>
    </text>
    <rect x="1180" y="510" width="44" height="3" rx="1.5" fill="#3a7ba8"/>
    <text x="1180" y="528" fill="#3a7ba8" font-weight="600" font-size="20" dominant-baseline="hanging">→ プラグイン外せず</text>
  </g>

  <!-- カード3：PHP古い -->
  <g>
    <rect x="160" y="650" width="760" height="350" rx="16" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow)"/>
    <rect x="160" y="644" width="760" height="350" rx="16" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>

    <circle cx="220" cy="644" r="32" fill="#3a7ba8"/>
    <text x="220" y="644" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="32">3</text>

    <rect x="200" y="700" width="100" height="100" rx="14" fill="#eaf4fb"/>
    <g transform="translate(225, 720)" fill="none" stroke="#3a7ba8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 30 L20 10 L40 30 L20 50 Z"/>
      <text x="20" y="38" font-size="20" font-weight="700" fill="#3a7ba8" stroke="none" text-anchor="middle">!</text>
    </g>

    <text x="340" y="700" fill="#1f2937" font-weight="700" font-size="36" dominant-baseline="hanging">PHPのバージョン古い</text>
    <text x="340" y="755" fill="#5da8d4" font-weight="600" font-size="20" letter-spacing="1" dominant-baseline="hanging">PROBLEM 3</text>
    <text x="340" y="805" fill="#4b5563" font-weight="400" font-size="22" dominant-baseline="hanging">
      <tspan x="340" dy="0">システムの土台になっている言語が</tspan>
      <tspan x="340" dy="32">古く、テーマ側が対応してくれない。</tspan>
      <tspan x="340" dy="32">バージョン更新も連鎖事故が怖い。</tspan>
    </text>
    <rect x="340" y="920" width="44" height="3" rx="1.5" fill="#3a7ba8"/>
    <text x="340" y="938" fill="#3a7ba8" font-weight="600" font-size="20" dominant-baseline="hanging">→ 連鎖事故が怖い</text>
  </g>

  <!-- カード4：フォーム死亡 -->
  <g>
    <rect x="1000" y="650" width="760" height="350" rx="16" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow)"/>
    <rect x="1000" y="644" width="760" height="350" rx="16" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>

    <circle cx="1060" cy="644" r="32" fill="#3a7ba8"/>
    <text x="1060" y="644" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="32">4</text>

    <rect x="1040" y="700" width="100" height="100" rx="14" fill="#eaf4fb"/>
    <g transform="translate(1060, 720)" fill="none" stroke="#3a7ba8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="0" width="50" height="50" rx="4"/>
      <line x1="10" y1="14" x2="40" y2="14"/>
      <line x1="10" y1="26" x2="40" y2="26"/>
      <line x1="10" y1="38" x2="30" y2="38"/>
      <line x1="0" y1="0" x2="50" y2="50" stroke="#3a7ba8" stroke-width="4"/>
    </g>

    <text x="1180" y="700" fill="#1f2937" font-weight="700" font-size="36" dominant-baseline="hanging">申し込みフォーム死亡</text>
    <text x="1180" y="755" fill="#5da8d4" font-weight="600" font-size="20" letter-spacing="1" dominant-baseline="hanging">PROBLEM 4</text>
    <text x="1180" y="805" fill="#4b5563" font-weight="400" font-size="22" dominant-baseline="hanging">
      <tspan x="1180" dy="0">巻き戻し後、フォームの</tspan>
      <tspan x="1180" dy="32">プラグインが動かなくなった。</tspan>
      <tspan x="1180" dy="32">問い合わせ受付ができない。</tspan>
    </text>
    <rect x="1180" y="920" width="44" height="3" rx="1.5" fill="#3a7ba8"/>
    <text x="1180" y="938" fill="#3a7ba8" font-weight="600" font-size="20" dominant-baseline="hanging">→ 受付不能</text>
  </g>
</svg>
