<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="100%" preserveAspectRatio="xMidYMid meet">
  <rect width="1280" height="670" fill="#f8f9fa"/>

  <!-- 上部 -->
  <text x="80" y="60" fill="#5da8d4" font-weight="600" font-size="18" letter-spacing="3" dominant-baseline="hanging">中小企業のひとりDX担当が、AIで会社をアップデートする</text>
  <line x1="80" y1="98" x2="200" y2="98" stroke="#5da8d4" stroke-width="3"/>
  <text x="1200" y="60" text-anchor="end" fill="#f59e0b" font-weight="700" font-size="22" letter-spacing="2" dominant-baseline="hanging">#04 — FORM AUTOMATION</text>

  <!-- メインタイトル -->
  <text x="80" y="170" font-weight="700" font-size="56" dominant-baseline="hanging">
    <tspan fill="#1f2937">申し込みフォーム</tspan>
  </text>
  <text x="80" y="246" font-weight="700" font-size="56" dominant-baseline="hanging">
    <tspan fill="#3a7ba8">送信1回</tspan><tspan fill="#1f2937">で、</tspan>
  </text>
  <text x="80" y="322" font-weight="700" font-size="56" dominant-baseline="hanging">
    <tspan fill="#f59e0b">5つの処理</tspan><tspan fill="#1f2937">が</tspan>
  </text>
  <text x="80" y="398" font-weight="700" font-size="56" dominant-baseline="hanging">
    <tspan fill="#1f2937">同時に走る</tspan>
  </text>

  <!-- 右：1フォーム→5矢印 -->
  <g transform="translate(870, 175)">
    <!-- 中央フォーム -->
    <g>
      <rect x="0" y="135" width="120" height="80" rx="10" fill="#3a7ba8"/>
      <text x="60" y="170" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="700" font-size="20" letter-spacing="2">FORM</text>
      <text x="60" y="194" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="500" font-size="13" letter-spacing="1">1 SEND</text>
    </g>

    <!-- 5本の矢印 -->
    <g stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="125" y1="155" x2="220" y2="30"/>
      <polyline points="215,40 220,30 209,32"/>
      <line x1="125" y1="165" x2="220" y2="105"/>
      <polyline points="214,103 220,105 215,112"/>
      <line x1="125" y1="175" x2="220" y2="180"/>
      <polyline points="214,176 220,180 214,184"/>
      <line x1="125" y1="185" x2="220" y2="255"/>
      <polyline points="215,247 220,255 211,253"/>
      <line x1="125" y1="195" x2="220" y2="330"/>
      <polyline points="214,320 220,330 209,328"/>
    </g>

    <!-- 受け先5バッジ -->
    <g>
      <circle cx="252" cy="30" r="24" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="252" y="32" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="22">1</text>

      <circle cx="252" cy="105" r="24" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="252" y="107" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="22">2</text>

      <circle cx="252" cy="180" r="24" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="252" y="182" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="22">3</text>

      <circle cx="252" cy="255" r="26" fill="#f59e0b" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="252" y="257" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="700" font-size="22">4</text>

      <circle cx="252" cy="330" r="24" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="252" y="332" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="22">5</text>
    </g>
  </g>

  <!-- フッター -->
  <g>
    <rect x="280" y="568" width="720" height="52" rx="26" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="312" cy="594" r="6" fill="#f59e0b"/>
    <text x="334" y="594" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="20" letter-spacing="0.5">中継だらけの動線を、1回の送信に畳む</text>
  </g>
</svg>
