<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="100%" preserveAspectRatio="xMidYMid meet">
  <rect width="1280" height="670" fill="#f8f9fa"/>

  <!-- 上部 -->
  <text x="80" y="60" fill="#5da8d4" font-weight="600" font-size="18" letter-spacing="3" dominant-baseline="hanging">中小企業のひとりDX担当が、AIで会社をアップデートする</text>
  <line x1="80" y1="98" x2="200" y2="98" stroke="#5da8d4" stroke-width="3"/>
  <text x="1200" y="60" text-anchor="end" fill="#f59e0b" font-weight="700" font-size="22" letter-spacing="2" dominant-baseline="hanging">#09 — INFRA ③</text>

  <!-- メインタイトル -->
  <text x="80" y="170" font-weight="700" font-size="46" dominant-baseline="hanging">
    <tspan fill="#1f2937">商談ごとに作っていた</tspan>
  </text>
  <text x="80" y="240" font-weight="700" font-size="46" dominant-baseline="hanging">
    <tspan fill="#3a7ba8">16ページの営業資料</tspan><tspan fill="#1f2937">を、</tspan>
  </text>
  <text x="80" y="310" font-weight="700" font-size="46" dominant-baseline="hanging">
    <tspan fill="#1f2937">顧客名と日付で</tspan><tspan fill="#f59e0b">5分で出せる</tspan>
  </text>
  <text x="80" y="380" font-weight="700" font-size="46" dominant-baseline="hanging">
    <tspan fill="#1f2937">ようになった話。</tspan>
  </text>

  <!-- 右：3カード -->
  <!-- カード1：テンプレ -->
  <g>
    <rect x="820" y="145" width="340" height="120" rx="16" fill="#fff" stroke="#f59e0b" stroke-width="2.8"/>
    <g transform="translate(890, 205)">
      <rect x="-35" y="-27" width="70" height="55" rx="4" fill="#fff" stroke="#3a7ba8" stroke-width="2.5"/>
      <line x1="-25" y1="-15" x2="25" y2="-15" stroke="#3a7ba8" stroke-width="2"/>
      <line x1="-25" y1="-5" x2="25" y2="-5" stroke="#3a7ba8" stroke-width="2"/>
      <line x1="-25" y1="5" x2="18" y2="5" stroke="#3a7ba8" stroke-width="2"/>
      <rect x="-25" y="13" width="28" height="10" fill="#a8d4ee"/>
    </g>
    <text x="985" y="199" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="24">テンプレ</text>
    <text x="985" y="227" dominant-baseline="central" fill="#6b7280" font-size="16" letter-spacing="0.5">8割は固定</text>
  </g>

  <!-- カード2：顧客プロファイル -->
  <g>
    <rect x="820" y="277" width="340" height="120" rx="16" fill="#fff" stroke="#f59e0b" stroke-width="2.8"/>
    <g transform="translate(890, 337)">
      <rect x="-35" y="-27" width="70" height="55" rx="4" fill="#fef3e2" stroke="#f59e0b" stroke-width="2.5"/>
      <line x1="-25" y1="-15" x2="18" y2="-15" stroke="#3a7ba8" stroke-width="2"/>
      <line x1="-25" y1="-5" x2="25" y2="-5" stroke="#3a7ba8" stroke-width="2"/>
      <line x1="-25" y1="5" x2="20" y2="5" stroke="#3a7ba8" stroke-width="2"/>
      <line x1="-25" y1="15" x2="13" y2="15" stroke="#3a7ba8" stroke-width="2"/>
    </g>
    <text x="985" y="331" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="24">プロファイル</text>
    <text x="985" y="359" dominant-baseline="central" fill="#6b7280" font-size="16" letter-spacing="0.5">2割を書く</text>
  </g>

  <!-- カード3：5分 -->
  <g>
    <rect x="820" y="409" width="340" height="120" rx="16" fill="#fff" stroke="#f59e0b" stroke-width="2.8"/>
    <g transform="translate(890, 469)">
      <circle cx="-18" cy="0" r="25" fill="#fff" stroke="#3a7ba8" stroke-width="2.5"/>
      <line x1="-18" y1="0" x2="-18" y2="-14" stroke="#3a7ba8" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="-18" y1="0" x2="-7" y2="0" stroke="#3a7ba8" stroke-width="2.8" stroke-linecap="round"/>
      <rect x="15" y="-22" width="28" height="40" rx="3" fill="#fef3e2" stroke="#f59e0b" stroke-width="2"/>
      <line x1="20" y1="-12" x2="38" y2="-12" stroke="#f59e0b" stroke-width="1.6"/>
      <line x1="20" y1="-4" x2="38" y2="-4" stroke="#f59e0b" stroke-width="1.6"/>
      <line x1="20" y1="4" x2="32" y2="4" stroke="#f59e0b" stroke-width="1.6"/>
    </g>
    <text x="985" y="463" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="24">5分</text>
    <text x="985" y="491" dominant-baseline="central" fill="#6b7280" font-size="16" letter-spacing="0.5">で資料が出る</text>
  </g>

  <!-- フッターキャッチ -->
  <g>
    <rect x="200" y="568" width="880" height="52" rx="26" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="232" cy="594" r="6" fill="#f59e0b"/>
    <text x="254" y="594" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="20" letter-spacing="0.5">2割の手作業を、AIに渡した話</text>
  </g>
</svg>
