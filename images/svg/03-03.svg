<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow33" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">MINDSET SHIFT</text>
  <text x="80" y="112" font-weight="700" font-size="44" dominant-baseline="hanging">
    <tspan fill="#1f2937">AIに「</tspan><tspan fill="#3a7ba8">コードを書かせる</tspan><tspan fill="#1f2937">」と「</tspan><tspan fill="#f59e0b">ツールを作らせる</tspan><tspan fill="#1f2937">」は、まったく違う</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">144 PAGES MIGRATION</text>
  <text x="1840" y="116" text-anchor="end" fill="#3a7ba8" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">12h → 1h</text>

  <!-- 左カード：AIにコードを書かせる -->
  <g>
    <rect x="80" y="240" width="850" height="660" rx="14" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow33)"/>
    <rect x="80" y="234" width="850" height="660" rx="14" fill="#ffffff" stroke="#ecf2f7" stroke-width="1.5"/>

    <rect x="110" y="270" width="190" height="36" rx="18" fill="#ecf2f7"/>
    <text x="205" y="288" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="18" letter-spacing="1.2">PATTERN A</text>

    <text x="110" y="340" fill="#1f2937" font-weight="700" font-size="36" dominant-baseline="hanging">AIに「コードを書かせる」</text>
    <text x="110" y="394" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">AIは「1件分の労働力」にしかならない</text>

    <!-- 図解 -->
    <g transform="translate(110, 470)">
      <!-- Person -->
      <circle cx="40" cy="50" r="20" fill="#a8d4ee"/>
      <rect x="22" y="74" width="36" height="56" rx="8" fill="#a8d4ee"/>
      <text x="40" y="148" text-anchor="middle" fill="#4b5563" font-size="16" font-weight="600" dominant-baseline="hanging">人</text>

      <!-- Arrow to AI -->
      <line x1="68" y1="80" x2="170" y2="80" stroke="#3a7ba8" stroke-width="2.5" stroke-linecap="round"/>
      <polyline points="160,73 172,80 160,87" fill="none" stroke="#3a7ba8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- AI -->
      <rect x="180" y="50" width="110" height="60" rx="10" fill="#5da8d4"/>
      <text x="235" y="80" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="22">AI</text>
      <text x="235" y="148" text-anchor="middle" fill="#4b5563" font-size="16" font-weight="600" dominant-baseline="hanging">1件直す</text>

      <!-- ×144 label -->
      <text x="430" y="80" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="38">× 144</text>
      <text x="430" y="148" text-anchor="middle" fill="#6b7280" font-size="16" font-weight="500" dominant-baseline="hanging">同じ依頼を144回</text>

      <!-- Pages grid -->
      <g transform="translate(560, 10)">
        <g>
          <rect x="0" y="0" width="48" height="62" rx="4" fill="#ecf2f7" stroke="#a8d4ee" stroke-width="1.5"/>
          <line x1="8" y1="14" x2="40" y2="14" stroke="#a8d4ee" stroke-width="1.5"/>
          <line x1="8" y1="26" x2="40" y2="26" stroke="#a8d4ee" stroke-width="1.5"/>
          <line x1="8" y1="38" x2="32" y2="38" stroke="#a8d4ee" stroke-width="1.5"/>
        </g>
        <g transform="translate(60, 0)"><rect x="0" y="0" width="48" height="62" rx="4" fill="#ecf2f7" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="14" x2="40" y2="14" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="26" x2="40" y2="26" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="38" x2="32" y2="38" stroke="#a8d4ee" stroke-width="1.5"/></g>
        <g transform="translate(120, 0)"><rect x="0" y="0" width="48" height="62" rx="4" fill="#ecf2f7" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="14" x2="40" y2="14" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="26" x2="40" y2="26" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="38" x2="32" y2="38" stroke="#a8d4ee" stroke-width="1.5"/></g>
        <g transform="translate(0, 75)"><rect x="0" y="0" width="48" height="62" rx="4" fill="#ecf2f7" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="14" x2="40" y2="14" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="26" x2="40" y2="26" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="38" x2="32" y2="38" stroke="#a8d4ee" stroke-width="1.5"/></g>
        <g transform="translate(60, 75)"><rect x="0" y="0" width="48" height="62" rx="4" fill="#ecf2f7" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="14" x2="40" y2="14" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="26" x2="40" y2="26" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="38" x2="32" y2="38" stroke="#a8d4ee" stroke-width="1.5"/></g>
        <g transform="translate(120, 75)"><rect x="0" y="0" width="48" height="62" rx="4" fill="#ecf2f7" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="14" x2="40" y2="14" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="26" x2="40" y2="26" stroke="#a8d4ee" stroke-width="1.5"/><line x1="8" y1="38" x2="32" y2="38" stroke="#a8d4ee" stroke-width="1.5"/></g>
        <text x="86" y="158" text-anchor="middle" fill="#4b5563" font-size="16" font-weight="600" dominant-baseline="hanging">144件のページ</text>
      </g>
    </g>

    <!-- スタッツ -->
    <rect x="110" y="730" width="790" height="130" rx="10" fill="#ecf2f7"/>
    <text x="140" y="754" fill="#3a7ba8" font-weight="600" font-size="18" letter-spacing="1.5" dominant-baseline="hanging">TIME COST</text>
    <text x="140" y="794" fill="#1f2937" font-weight="700" font-size="34" dominant-baseline="hanging">5分 × 144件 = </text>
    <text x="430" y="794" fill="#3a7ba8" font-weight="700" font-size="36" dominant-baseline="hanging">12時間</text>
    <text x="140" y="844" fill="#6b7280" font-weight="500" font-size="18" dominant-baseline="hanging">(集中できた場合の試算。子どもの面倒や打ち合わせは含まず)</text>
  </g>

  <!-- 右カード：AIにツールを作らせる（オレンジ強調） -->
  <g>
    <rect x="990" y="240" width="850" height="660" rx="14" fill="#f59e0b" opacity="0.12" filter="url(#softShadow33)"/>
    <rect x="990" y="234" width="850" height="660" rx="14" fill="#ffffff" stroke="#fde6c1" stroke-width="2"/>

    <rect x="1020" y="270" width="190" height="36" rx="18" fill="#fef3e2"/>
    <text x="1115" y="288" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="18" letter-spacing="1.2">PATTERN B</text>

    <text x="1020" y="340" fill="#1f2937" font-weight="700" font-size="36" dominant-baseline="hanging">AIに「ツールを作らせる」</text>
    <text x="1020" y="394" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">AIは「仕組みづくり」の相棒になる</text>

    <!-- 図解 -->
    <g transform="translate(1020, 470)">
      <!-- Person -->
      <circle cx="40" cy="50" r="20" fill="#fcd590"/>
      <rect x="22" y="74" width="36" height="56" rx="8" fill="#fcd590"/>
      <text x="40" y="148" text-anchor="middle" fill="#4b5563" font-size="16" font-weight="600" dominant-baseline="hanging">人</text>

      <!-- Arrow to AI -->
      <line x1="68" y1="80" x2="160" y2="80" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
      <polyline points="150,73 162,80 150,87" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- AI -->
      <rect x="170" y="50" width="100" height="60" rx="10" fill="#f59e0b"/>
      <text x="220" y="80" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="22">AI</text>
      <text x="220" y="148" text-anchor="middle" fill="#4b5563" font-size="16" font-weight="600" dominant-baseline="hanging">1回だけ</text>

      <!-- Arrow to Tool -->
      <line x1="280" y1="80" x2="370" y2="80" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
      <polyline points="360,73 372,80 360,87" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Tool -->
      <rect x="380" y="40" width="170" height="80" rx="10" fill="#fff7e6" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="465" y="76" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="22">変換ツール</text>
      <text x="465" y="104" text-anchor="middle" dominant-baseline="central" fill="#9a6a18" font-weight="500" font-size="16">HTML / JavaScript</text>
      <text x="465" y="148" text-anchor="middle" fill="#4b5563" font-size="16" font-weight="600" dominant-baseline="hanging">144件を流す</text>

      <!-- Fan arrows -->
      <g stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85">
        <line x1="555" y1="60" x2="600" y2="20"/>
        <line x1="560" y1="80" x2="600" y2="80"/>
        <line x1="555" y1="100" x2="600" y2="140"/>
      </g>

      <!-- Pages grid -->
      <g transform="translate(610, 10)">
        <g><rect x="0" y="0" width="48" height="62" rx="4" fill="#fef3e2" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="14" x2="40" y2="14" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="26" x2="40" y2="26" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="38" x2="32" y2="38" stroke="#f59e0b" stroke-width="1.5"/></g>
        <g transform="translate(60, 0)"><rect x="0" y="0" width="48" height="62" rx="4" fill="#fef3e2" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="14" x2="40" y2="14" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="26" x2="40" y2="26" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="38" x2="32" y2="38" stroke="#f59e0b" stroke-width="1.5"/></g>
        <g transform="translate(120, 0)"><rect x="0" y="0" width="48" height="62" rx="4" fill="#fef3e2" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="14" x2="40" y2="14" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="26" x2="40" y2="26" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="38" x2="32" y2="38" stroke="#f59e0b" stroke-width="1.5"/></g>
        <g transform="translate(0, 75)"><rect x="0" y="0" width="48" height="62" rx="4" fill="#fef3e2" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="14" x2="40" y2="14" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="26" x2="40" y2="26" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="38" x2="32" y2="38" stroke="#f59e0b" stroke-width="1.5"/></g>
        <g transform="translate(60, 75)"><rect x="0" y="0" width="48" height="62" rx="4" fill="#fef3e2" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="14" x2="40" y2="14" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="26" x2="40" y2="26" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="38" x2="32" y2="38" stroke="#f59e0b" stroke-width="1.5"/></g>
        <g transform="translate(120, 75)"><rect x="0" y="0" width="48" height="62" rx="4" fill="#fef3e2" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="14" x2="40" y2="14" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="26" x2="40" y2="26" stroke="#f59e0b" stroke-width="1.5"/><line x1="8" y1="38" x2="32" y2="38" stroke="#f59e0b" stroke-width="1.5"/></g>
        <text x="86" y="158" text-anchor="middle" fill="#4b5563" font-size="16" font-weight="600" dominant-baseline="hanging">144件のページ</text>
      </g>
    </g>

    <!-- スタッツ -->
    <rect x="1020" y="730" width="790" height="130" rx="10" fill="#fef3e2"/>
    <text x="1050" y="754" fill="#f59e0b" font-weight="600" font-size="18" letter-spacing="1.5" dominant-baseline="hanging">TIME COST</text>
    <text x="1050" y="794" fill="#1f2937" font-weight="700" font-size="32" dominant-baseline="hanging">2時間 + 30秒×144件 ≒ </text>
    <text x="1530" y="794" fill="#f59e0b" font-weight="700" font-size="36" dominant-baseline="hanging">1時間ちょっと</text>
    <text x="1050" y="844" fill="#6b7280" font-weight="500" font-size="18" dominant-baseline="hanging">(2時間でツールを作って、あとは流すだけ)</text>
  </g>

  <!-- フッター -->
  <g>
    <rect x="430" y="970" width="1060" height="56" rx="28" fill="#ffffff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="464" cy="998" r="6" fill="#f59e0b"/>
    <text x="488" y="998" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="22" letter-spacing="0.8">仕組みを作らせるほうが、圧倒的に効く</text>
  </g>
</svg>
