<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="100%" preserveAspectRatio="xMidYMid meet">
  <rect width="1280" height="670" fill="#f8f9fa"/>

  <text x="80" y="60" fill="#1f2937" font-weight="700" font-size="50" dominant-baseline="hanging">実績DBを、雛形に流し込めるか</text>
  <line x1="80" y1="140" x2="260" y2="140" stroke="#f59e0b" stroke-width="5"/>

  <!-- 左：顧客プロファイル -->
  <g transform="translate(40, 200)">
    <rect width="360" height="420" rx="20" fill="#fef3e2" stroke="#f59e0b" stroke-width="4"/>
    <text x="180" y="50" text-anchor="middle" font-weight="700" font-size="40" fill="#1f2937" dominant-baseline="hanging">顧客プロファイル</text>

    <!-- 顧客名 -->
    <g transform="translate(50, 140)">
      <circle cx="22" cy="22" r="20" fill="#fff" stroke="#3a7ba8" stroke-width="3"/>
      <circle cx="22" cy="17" r="7" fill="#3a7ba8"/>
      <path d="M 6,38 Q 22,24 38,38 L 38,42 L 6,42 Z" fill="#3a7ba8"/>
      <text x="70" y="28" font-weight="700" font-size="40" fill="#1f2937" dominant-baseline="central">顧客名</text>
    </g>

    <!-- 日付 -->
    <g transform="translate(50, 210)">
      <rect x="2" y="6" width="40" height="32" rx="4" fill="#fff" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="2" y1="16" x2="42" y2="16" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="10" y1="2" x2="10" y2="10" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="34" y1="2" x2="34" y2="10" stroke="#3a7ba8" stroke-width="3"/>
      <text x="70" y="22" font-weight="700" font-size="40" fill="#1f2937" dominant-baseline="central">日付</text>
    </g>

    <!-- 類似実績 -->
    <g transform="translate(50, 280)">
      <rect x="0" y="6" width="44" height="34" rx="3" fill="#fff" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="8" y1="18" x2="36" y2="18" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="8" y1="26" x2="36" y2="26" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="8" y1="34" x2="28" y2="34" stroke="#3a7ba8" stroke-width="3"/>
      <text x="70" y="22" font-weight="700" font-size="40" fill="#1f2937" dominant-baseline="central">類似実績</text>
    </g>

    <!-- 参考記事 -->
    <g transform="translate(50, 350)">
      <rect x="0" y="6" width="44" height="34" rx="3" fill="#fef3e2" stroke="#f59e0b" stroke-width="3"/>
      <line x1="8" y1="18" x2="36" y2="18" stroke="#f59e0b" stroke-width="3"/>
      <line x1="8" y1="26" x2="36" y2="26" stroke="#f59e0b" stroke-width="3"/>
      <text x="70" y="22" font-weight="700" font-size="40" fill="#1f2937" dominant-baseline="central">参考記事</text>
    </g>
  </g>

  <!-- 矢印1（短く） -->
  <g transform="translate(420, 410)">
    <path d="M 0,0 L 40,0" stroke="#f59e0b" stroke-width="10" stroke-linecap="round"/>
    <polygon points="36,-18 60,0 36,18" fill="#f59e0b"/>
  </g>

  <!-- 中央：HTML雛形＋実績DB -->
  <g transform="translate(510, 200)">
    <rect width="400" height="420" rx="20" fill="#fff" stroke="#3a7ba8" stroke-width="4"/>
    <text x="200" y="50" text-anchor="middle" font-weight="700" font-size="36" fill="#1f2937" dominant-baseline="hanging">HTML雛形 ＋ 実績DB</text>

    <!-- HTML雛形カード -->
    <g transform="translate(40, 140)">
      <rect width="150" height="250" rx="10" fill="#eff6fb" stroke="#3a7ba8" stroke-width="3"/>
      <text x="75" y="36" text-anchor="middle" font-weight="700" font-size="26" fill="#3a7ba8" dominant-baseline="central">HTML雛形</text>
      <line x1="14" y1="88" x2="136" y2="88" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="14" y1="118" x2="136" y2="118" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="14" y1="148" x2="110" y2="148" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="14" y1="178" x2="136" y2="178" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="14" y1="208" x2="110" y2="208" stroke="#3a7ba8" stroke-width="3"/>
    </g>

    <!-- 実績DBカード -->
    <g transform="translate(210, 140)">
      <rect width="150" height="250" rx="10" fill="#fef3e2" stroke="#f59e0b" stroke-width="3"/>
      <text x="75" y="36" text-anchor="middle" font-weight="700" font-size="26" fill="#f59e0b" dominant-baseline="central">実績DB</text>
      <rect x="14" y="68" width="122" height="22" rx="3" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
      <rect x="14" y="98" width="122" height="22" rx="3" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
      <rect x="14" y="128" width="122" height="22" rx="3" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
      <rect x="14" y="158" width="122" height="22" rx="3" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
      <rect x="14" y="188" width="122" height="22" rx="3" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    </g>
  </g>

  <!-- 矢印2（短く） -->
  <g transform="translate(930, 410)">
    <path d="M 0,0 L 40,0" stroke="#3a7ba8" stroke-width="10" stroke-linecap="round"/>
    <polygon points="36,-18 60,0 36,18" fill="#3a7ba8"/>
  </g>

  <!-- 右：完成資料 -->
  <g transform="translate(1020, 160)">
    <text x="115" y="50" text-anchor="middle" font-weight="700" font-size="40" fill="#1f2937" dominant-baseline="hanging">完成資料</text>
    <g transform="translate(20, 140)">
      <rect x="0" y="0" width="140" height="240" rx="10" fill="#fff" stroke="#3a7ba8" stroke-width="3"/>
      <rect x="20" y="20" width="140" height="240" rx="10" fill="#fff" stroke="#3a7ba8" stroke-width="3"/>
      <rect x="40" y="40" width="140" height="240" rx="10" fill="#fef3e2" stroke="#f59e0b" stroke-width="4"/>
      <text x="110" y="135" text-anchor="middle" dominant-baseline="central" font-weight="700" font-size="52" fill="#1f2937">16</text>
      <text x="110" y="190" text-anchor="middle" dominant-baseline="central" font-weight="700" font-size="32" fill="#1f2937">ページ</text>
      <text x="110" y="240" text-anchor="middle" dominant-baseline="central" font-weight="700" font-size="24" fill="#3a7ba8">HTML</text>
    </g>
  </g>
</svg>
