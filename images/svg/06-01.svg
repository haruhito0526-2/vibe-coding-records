<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow61" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">CHAPTER 01 — THE MAP</text>
  <text x="80" y="112" font-weight="700" font-size="44" dominant-baseline="hanging">
    <tspan fill="#1f2937">ブログの</tspan><tspan fill="#3a7ba8">3工程</tspan><tspan fill="#1f2937">と、3つの</tspan><tspan fill="#f59e0b">決まりどころ</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">VOL.6 — PIPELINE ②</text>
  <text x="1840" y="116" text-anchor="end" fill="#f59e0b" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">MAP</text>

  <!-- 左：ブログ記事の3工程 -->
  <g>
    <text x="120" y="240" fill="#3a7ba8" font-weight="700" font-size="22" letter-spacing="2" dominant-baseline="hanging">ブログ記事の3工程</text>

    <!-- 文章 -->
    <g>
      <rect x="120" y="290" width="380" height="110" rx="14" fill="#fff" stroke="#a8d4ee" stroke-width="2"/>
      <rect x="120" y="290" width="8" height="110" fill="#5da8d4"/>
      <text x="148" y="328" fill="#1f2937" font-weight="700" font-size="26" dominant-baseline="hanging">文章を書く</text>
      <text x="148" y="362" fill="#6b7280" font-size="16" dominant-baseline="hanging">原稿そのもの</text>
    </g>

    <!-- 画像 -->
    <g>
      <rect x="120" y="430" width="380" height="180" rx="14" fill="#fff" stroke="#a8d4ee" stroke-width="2"/>
      <rect x="120" y="430" width="8" height="180" fill="#5da8d4"/>
      <text x="148" y="468" fill="#1f2937" font-weight="700" font-size="26" dominant-baseline="hanging">画像を作る</text>
      <line x1="148" y1="514" x2="472" y2="514" stroke="#ecf2f7" stroke-width="1.5"/>
      <text x="148" y="528" fill="#6b7280" font-size="15" dominant-baseline="hanging">よく見ると2種類が混ざっている</text>
      <g>
        <circle cx="160" cy="566" r="4" fill="#f59e0b"/>
        <text x="176" y="566" dominant-baseline="central" fill="#1f2937" font-weight="500" font-size="16">シーンや状況の画像</text>
      </g>
      <g>
        <circle cx="160" cy="592" r="4" fill="#f59e0b"/>
        <text x="176" y="592" dominant-baseline="central" fill="#1f2937" font-weight="500" font-size="16">概念やフローの図解</text>
      </g>
    </g>

    <!-- レイアウト -->
    <g>
      <rect x="120" y="640" width="380" height="110" rx="14" fill="#fff" stroke="#a8d4ee" stroke-width="2"/>
      <rect x="120" y="640" width="8" height="110" fill="#5da8d4"/>
      <text x="148" y="678" fill="#1f2937" font-weight="700" font-size="26" dominant-baseline="hanging">レイアウト</text>
      <text x="148" y="712" fill="#6b7280" font-size="16" dominant-baseline="hanging">取り込み形式に変換</text>
    </g>
  </g>

  <!-- 中央：矢印 -->
  <g stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
    <line x1="540" y1="345" x2="780" y2="345"/>
    <polyline points="768,336 782,345 768,354"/>
    <line x1="540" y1="490" x2="780" y2="490"/>
    <polyline points="768,481 782,490 768,499"/>
    <line x1="540" y1="555" x2="780" y2="555"/>
    <polyline points="768,546 782,555 768,564"/>
    <line x1="540" y1="695" x2="780" y2="695"/>
    <polyline points="768,686 782,695 768,704"/>
  </g>

  <!-- 右：3つの決まりどころ -->
  <g>
    <text x="800" y="240" fill="#f59e0b" font-weight="700" font-size="22" letter-spacing="2" dominant-baseline="hanging">それぞれの動かし方</text>

    <!-- 文章 → AIで動く（解決済み） -->
    <g>
      <rect x="800" y="290" width="980" height="110" rx="14" fill="#ecf2f7" stroke="#a8d4ee" stroke-width="2"/>
      <text x="830" y="328" fill="#3a7ba8" font-weight="700" font-size="22" dominant-baseline="hanging">文章はもうAIで動く</text>
      <text x="830" y="362" fill="#6b7280" font-size="16" dominant-baseline="hanging">チャットでやり取りすれば、骨組みは返ってくる（前編で書いた話）</text>
    </g>

    <!-- シーン系 → API化 -->
    <g>
      <rect x="800" y="430" width="980" height="80" rx="14" fill="#fff" stroke="#fde6c1" stroke-width="2"/>
      <rect x="800" y="430" width="8" height="80" fill="#f59e0b"/>
      <text x="830" y="455" fill="#1f2937" font-weight="700" font-size="22" dominant-baseline="hanging">シーン系の画像 → ナノバナナを<tspan fill="#f59e0b">APIで</tspan>呼ぶ</text>
      <text x="830" y="485" fill="#6b7280" font-size="16" dominant-baseline="hanging">画面の行き来をやめて、Claudeから直接お願いする</text>
    </g>

    <!-- 概念系 → SVG -->
    <g>
      <rect x="800" y="525" width="980" height="80" rx="14" fill="#fff" stroke="#fde6c1" stroke-width="2"/>
      <rect x="800" y="525" width="8" height="80" fill="#f59e0b"/>
      <text x="830" y="550" fill="#1f2937" font-weight="700" font-size="22" dominant-baseline="hanging">概念系の図解 → <tspan fill="#f59e0b">SVG</tspan>でAIに組み立てさせる</text>
      <text x="830" y="580" fill="#6b7280" font-size="16" dominant-baseline="hanging">「絵」じゃなく「設計図」で描く。文字も矢印も崩れない</text>
    </g>

    <!-- レイアウト → XML変換 -->
    <g>
      <rect x="800" y="640" width="980" height="110" rx="14" fill="#fff" stroke="#fde6c1" stroke-width="2"/>
      <rect x="800" y="640" width="8" height="110" fill="#f59e0b"/>
      <text x="830" y="668" fill="#1f2937" font-weight="700" font-size="22" dominant-baseline="hanging">レイアウト（取り込み） → <tspan fill="#f59e0b">XML変換ツール</tspan>を作らせる</text>
      <text x="830" y="700" fill="#6b7280" font-size="16" dominant-baseline="hanging">仕様のクセを潰す変換ツールを、AIに書いてもらう</text>
      <text x="830" y="724" fill="#6b7280" font-size="16" dominant-baseline="hanging">原稿を投げると、note取り込み用のXMLが返ってくる</text>
    </g>
  </g>

  <!-- フッター -->
  <g>
    <rect x="380" y="940" width="1160" height="56" rx="28" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="414" cy="968" r="6" fill="#f59e0b"/>
    <text x="438" y="968" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="22" letter-spacing="0.8">3つの工程に、それぞれ別のやり方で答えを置いていった</text>
  </g>
</svg>
