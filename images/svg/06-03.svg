<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow63" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">CHAPTER 03 — THE SPLIT</text>
  <text x="80" y="112" font-weight="700" font-size="44" dominant-baseline="hanging">
    <tspan fill="#1f2937">写真風は</tspan><tspan fill="#f59e0b">ナノバナナ</tspan><tspan fill="#1f2937">、図解は</tspan><tspan fill="#3a7ba8">SVG</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">VOL.6 — PIPELINE ②</text>
  <text x="1840" y="116" text-anchor="end" fill="#f59e0b" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">SPLIT</text>

  <!-- 中央ライン -->
  <line x1="960" y1="240" x2="960" y2="880" stroke="#ecf2f7" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- 左：シーン系の画像 → ナノバナナ -->
  <g>
    <text x="120" y="240" fill="#f59e0b" font-weight="700" font-size="22" letter-spacing="2" dominant-baseline="hanging">シーンや状況の画像</text>
    <text x="120" y="276" fill="#1f2937" font-weight="700" font-size="32" dominant-baseline="hanging">→ ナノバナナで作る</text>

    <!-- サンプル画像（写真風） -->
    <g>
      <rect x="120" y="340" width="780" height="440" rx="14" fill="#fff" stroke="#fde6c1" stroke-width="2.5"/>
      <!-- 空グラデーション -->
      <rect x="140" y="360" width="740" height="280" rx="6" fill="#fef3e2"/>
      <!-- 太陽 -->
      <circle cx="780" cy="430" r="40" fill="#f59e0b" opacity="0.85"/>
      <circle cx="780" cy="430" r="60" fill="#f59e0b" opacity="0.2"/>
      <!-- 山 -->
      <polygon points="140,640 280,460 380,540 480,420 600,520 720,440 880,640" fill="#a8d4ee" stroke="#3a7ba8" stroke-width="1.5" stroke-linejoin="round"/>
      <polygon points="140,640 240,540 320,580 420,500 510,580 620,520 720,560 880,640" fill="#5da8d4" opacity="0.65"/>
      <!-- 地面 -->
      <rect x="140" y="640" width="740" height="20" fill="#fef3e2" stroke="#fde6c1" stroke-width="1"/>

      <!-- ラベル -->
      <text x="510" y="710" text-anchor="middle" fill="#1f2937" font-weight="600" font-size="20">「写真風で、横長で、人物なし」</text>
      <text x="510" y="744" text-anchor="middle" fill="#6b7280" font-size="16">空気感や雰囲気が伝わればOK。文字や数字は入れない</text>
    </g>

    <!-- 評価バッジ -->
    <g transform="translate(800, 320)">
      <rect x="-100" y="0" width="100" height="40" rx="20" fill="#f59e0b"/>
      <text x="-50" y="20" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="700" font-size="15" letter-spacing="1">得意</text>
    </g>
  </g>

  <!-- 右：概念系の図解 → SVG -->
  <g>
    <text x="1020" y="240" fill="#3a7ba8" font-weight="700" font-size="22" letter-spacing="2" dominant-baseline="hanging">概念やフローの図解</text>
    <text x="1020" y="276" fill="#1f2937" font-weight="700" font-size="32" dominant-baseline="hanging">→ SVGでAIに組み立てさせる</text>

    <!-- サンプル図解（フローチャート） -->
    <g>
      <rect x="1020" y="340" width="780" height="440" rx="14" fill="#fff" stroke="#a8d4ee" stroke-width="2.5"/>

      <!-- 3つのボックス＋矢印（きれいな図解の例） -->
      <g transform="translate(1060, 440)">
        <rect x="0" y="0" width="160" height="80" rx="8" fill="#ecf2f7" stroke="#3a7ba8" stroke-width="2"/>
        <text x="80" y="32" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="18">原稿</text>
        <text x="80" y="56" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-size="13">マークダウン</text>
      </g>

      <g stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1224" y1="480" x2="1306" y2="480"/>
        <polyline points="1294,471 1308,480 1294,489"/>
      </g>

      <g transform="translate(1310, 440)">
        <rect x="0" y="0" width="160" height="80" rx="8" fill="#fef3e2" stroke="#f59e0b" stroke-width="2"/>
        <text x="80" y="32" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="18">変換</text>
        <text x="80" y="56" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-size="13">AIが組み立てる</text>
      </g>

      <g stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1474" y1="480" x2="1556" y2="480"/>
        <polyline points="1544,471 1558,480 1544,489"/>
      </g>

      <g transform="translate(1560, 440)">
        <rect x="0" y="0" width="160" height="80" rx="8" fill="#ecf2f7" stroke="#3a7ba8" stroke-width="2"/>
        <text x="80" y="32" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="18">SVG</text>
        <text x="80" y="56" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-size="13">設計図ベース</text>
      </g>

      <!-- 説明 -->
      <text x="1410" y="600" text-anchor="middle" fill="#1f2937" font-weight="600" font-size="20">線・四角・文字を、AIが組み立てて描く</text>
      <text x="1410" y="634" text-anchor="middle" fill="#6b7280" font-size="16">数字も矢印もきれいに揃う／何度でも添削できる</text>
      <text x="1410" y="664" text-anchor="middle" fill="#6b7280" font-size="16">追加コストなし</text>

      <!-- 装飾：きれいな数字グラフ -->
      <g transform="translate(1100, 690)">
        <rect x="0" y="0" width="40" height="60" fill="#5da8d4"/>
        <rect x="50" y="-20" width="40" height="80" fill="#f59e0b"/>
        <rect x="100" y="-40" width="40" height="100" fill="#3a7ba8"/>
        <text x="20" y="78" text-anchor="middle" fill="#6b7280" font-size="12">A</text>
        <text x="70" y="78" text-anchor="middle" fill="#6b7280" font-size="12">B</text>
        <text x="120" y="78" text-anchor="middle" fill="#6b7280" font-size="12">C</text>
      </g>

      <!-- 装飾：パイ -->
      <g transform="translate(1640, 720)">
        <circle r="40" fill="#ecf2f7" stroke="#3a7ba8" stroke-width="2"/>
        <path d="M 0,0 L 40,0 A 40,40 0 0,1 12,38 Z" fill="#f59e0b"/>
        <path d="M 0,0 L 12,38 A 40,40 0 0,1 -38,12 Z" fill="#5da8d4"/>
      </g>
    </g>

    <!-- 評価バッジ -->
    <g transform="translate(1700, 320)">
      <rect x="-100" y="0" width="100" height="40" rx="20" fill="#3a7ba8"/>
      <text x="-50" y="20" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="700" font-size="15" letter-spacing="1">得意</text>
    </g>
  </g>

  <!-- 中央タイトル：画像といっても2種類ある -->
  <g transform="translate(960, 850)">
    <rect x="-260" y="-26" width="520" height="52" rx="26" fill="#fff" stroke="#a8d4ee" stroke-width="1.5"/>
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="20" letter-spacing="1">画像といっても、2種類ある</text>
  </g>

  <!-- フッター -->
  <g>
    <rect x="380" y="940" width="1160" height="56" rx="28" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="414" cy="968" r="6" fill="#f59e0b"/>
    <text x="438" y="968" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="22" letter-spacing="0.8">同じ「画像」でも、得意なAIと向くファイル形式が違う</text>
  </g>
</svg>
