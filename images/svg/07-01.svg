<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="100%" preserveAspectRatio="xMidYMid meet">
  <rect width="1280" height="670" fill="#f8f9fa"/>

  <text x="80" y="60" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">数字は溜まっているのに、誰も読んでいない</text>
  <line x1="80" y1="105" x2="200" y2="105" stroke="#f59e0b" stroke-width="3"/>

  <!-- GA4ミニ画面 -->
  <g>
    <rect x="60" y="170" width="240" height="280" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
    <rect x="60" y="170" width="240" height="40" rx="14" fill="#fef3e2"/>
    <rect x="60" y="200" width="240" height="10" fill="#fef3e2"/>
    <text x="80" y="190" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="16">GA4</text>
    <text x="130" y="190" dominant-baseline="central" fill="#6b7280" font-size="12">アクセス解析</text>
    <g transform="translate(80, 240)">
      <line x1="0" y1="160" x2="200" y2="160" stroke="#3a7ba8" stroke-width="1.5"/>
      <line x1="0" y1="160" x2="0" y2="0" stroke="#3a7ba8" stroke-width="1.5"/>
      <rect x="20" y="100" width="24" height="60" fill="#a8d4ee"/>
      <rect x="55" y="60" width="24" height="100" fill="#a8d4ee"/>
      <rect x="90" y="80" width="24" height="80" fill="#a8d4ee"/>
      <rect x="125" y="40" width="24" height="120" fill="#a8d4ee"/>
      <rect x="160" y="20" width="24" height="140" fill="#a8d4ee"/>
    </g>
    <text x="80" y="420" fill="#6b7280" font-size="11" dominant-baseline="hanging">Engagement rate / Sessions</text>
  </g>

  <!-- Search Consoleミニ画面 -->
  <g>
    <rect x="320" y="170" width="240" height="280" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
    <rect x="320" y="170" width="240" height="40" rx="14" fill="#fef3e2"/>
    <rect x="320" y="200" width="240" height="10" fill="#fef3e2"/>
    <text x="340" y="190" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="16">Search Console</text>
    <g transform="translate(340, 240)">
      <line x1="0" y1="120" x2="200" y2="120" stroke="#3a7ba8" stroke-width="1.5"/>
      <line x1="0" y1="120" x2="0" y2="0" stroke="#3a7ba8" stroke-width="1.5"/>
      <polyline points="0,80 40,60 80,75 120,40 160,55 200,30" fill="none" stroke="#a8d4ee" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="40" cy="60" r="3" fill="#3a7ba8"/>
      <circle cx="80" cy="75" r="3" fill="#3a7ba8"/>
      <circle cx="120" cy="40" r="3" fill="#3a7ba8"/>
      <circle cx="160" cy="55" r="3" fill="#3a7ba8"/>
      <circle cx="200" cy="30" r="3" fill="#3a7ba8"/>
    </g>
    <g transform="translate(340, 380)">
      <rect x="0" y="0" width="200" height="10" fill="#f8f9fa"/>
      <rect x="0" y="16" width="200" height="10" fill="#f8f9fa"/>
      <rect x="0" y="32" width="160" height="10" fill="#f8f9fa"/>
    </g>
    <text x="340" y="430" fill="#6b7280" font-size="11" dominant-baseline="hanging">検索クエリ / 掲載順位 / CTR</text>
  </g>

  <!-- 分厚い壁 -->
  <g>
    <rect x="600" y="170" width="80" height="280" fill="#d1d5db" stroke="#9ca3af" stroke-width="2"/>
    <line x1="600" y1="220" x2="680" y2="220" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="600" y1="270" x2="680" y2="270" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="600" y1="320" x2="680" y2="320" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="600" y1="370" x2="680" y2="370" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="600" y1="420" x2="680" y2="420" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="640" y1="170" x2="640" y2="220" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="620" y1="220" x2="620" y2="270" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="660" y1="220" x2="660" y2="270" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="640" y1="270" x2="640" y2="320" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="620" y1="320" x2="620" y2="370" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="660" y1="320" x2="660" y2="370" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="640" y1="370" x2="640" y2="420" stroke="#9ca3af" stroke-width="1.5"/>
    <text x="640" y="478" text-anchor="middle" fill="#6b7280" font-weight="700" font-size="13">専門用語と</text>
    <text x="640" y="498" text-anchor="middle" fill="#6b7280" font-weight="700" font-size="13">設定の壁</text>
  </g>

  <!-- 虫眼鏡＋× -->
  <g transform="translate(830, 310)">
    <circle cx="0" cy="0" r="65" fill="#fff" stroke="#9ca3af" stroke-width="4"/>
    <circle cx="-15" cy="-15" r="15" fill="none" stroke="#e5e7eb" stroke-width="2"/>
    <line x1="-26" y1="-26" x2="26" y2="26" stroke="#9ca3af" stroke-width="5" stroke-linecap="round"/>
    <line x1="-26" y1="26" x2="26" y2="-26" stroke="#9ca3af" stroke-width="5" stroke-linecap="round"/>
    <line x1="46" y1="46" x2="78" y2="78" stroke="#9ca3af" stroke-width="9" stroke-linecap="round"/>
  </g>
  <text x="830" y="450" text-anchor="middle" fill="#6b7280" font-weight="600" font-size="13">読もうとしても×</text>

  <!-- 人型＋?マーク -->
  <g transform="translate(1100, 200)">
    <text x="0" y="20" text-anchor="middle" fill="#f59e0b" font-weight="700" font-size="48">?</text>
    <circle cx="0" cy="100" r="36" fill="#a8d4ee" stroke="#3a7ba8" stroke-width="2.5"/>
    <path d="M -50,250 Q -50,170 0,170 Q 50,170 50,250 Z" fill="#a8d4ee" stroke="#3a7ba8" stroke-width="2.5"/>
  </g>
  <text x="1100" y="475" text-anchor="middle" fill="#6b7280" font-weight="600" font-size="13">担当者は？のまま</text>

  <!-- フッターキャッチ -->
  <g>
    <rect x="280" y="568" width="720" height="52" rx="26" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="312" cy="594" r="6" fill="#f59e0b"/>
    <text x="334" y="594" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="20" letter-spacing="0.5">数字は溜まっている。でも、誰も読んでいない</text>
  </g>
</svg>
