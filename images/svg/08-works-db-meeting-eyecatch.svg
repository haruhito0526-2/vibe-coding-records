<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="100%" preserveAspectRatio="xMidYMid meet">
  <rect width="1280" height="670" fill="#f8f9fa"/>

  <!-- 上部 -->
  <text x="80" y="60" fill="#5da8d4" font-weight="600" font-size="18" letter-spacing="3" dominant-baseline="hanging">中小企業のひとりDX担当が、AIで会社をアップデートする</text>
  <line x1="80" y1="98" x2="200" y2="98" stroke="#5da8d4" stroke-width="3"/>
  <text x="1200" y="60" text-anchor="end" fill="#f59e0b" font-weight="700" font-size="22" letter-spacing="2" dominant-baseline="hanging">#08 — INFRA ②</text>

  <!-- メインタイトル -->
  <text x="80" y="170" font-weight="700" font-size="48" dominant-baseline="hanging">
    <tspan fill="#1f2937">会社の</tspan><tspan fill="#3a7ba8">実績をDB化</tspan><tspan fill="#1f2937">して、</tspan>
  </text>
  <text x="80" y="240" font-weight="700" font-size="48" dominant-baseline="hanging">
    <tspan fill="#1f2937">商談中に</tspan><tspan fill="#f59e0b">その場で</tspan>
  </text>
  <text x="80" y="310" font-weight="700" font-size="48" dominant-baseline="hanging">
    <tspan fill="#1f2937">類似実績を出せる</tspan>
  </text>
  <text x="80" y="380" font-weight="700" font-size="48" dominant-baseline="hanging">
    <tspan fill="#1f2937">ようになった話。</tspan>
  </text>

  <!-- 右：3つのカード -->
  <g>
    <!-- カード1：実績（写真スタック） -->
    <g>
      <rect x="900" y="160" width="240" height="108" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
      <g transform="translate(966, 214)">
        <rect x="-30" y="-22" width="42" height="30" rx="3" fill="#fef3e2" stroke="#3a7ba8" stroke-width="1.5"/>
        <rect x="-22" y="-14" width="42" height="30" rx="3" fill="#fff" stroke="#3a7ba8" stroke-width="1.5"/>
        <rect x="-14" y="-6" width="42" height="30" rx="3" fill="#a8d4ee" stroke="#3a7ba8" stroke-width="2"/>
        <circle cx="-4" cy="3" r="3.5" fill="#f59e0b"/>
        <polygon points="-12,22 -2,12 6,18 16,8 26,22" fill="#3a7ba8" stroke="#3a7ba8" stroke-width="1.5" stroke-linejoin="round"/>
      </g>
      <text x="1050" y="206" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="20">実績</text>
      <text x="1050" y="232" dominant-baseline="central" fill="#6b7280" font-size="13" letter-spacing="0.5">過去案件</text>
    </g>

    <!-- カード2：DB化（テーブル） -->
    <g>
      <rect x="900" y="282" width="240" height="108" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
      <g transform="translate(966, 336)">
        <rect x="-30" y="-20" width="60" height="40" rx="3" fill="#fff" stroke="#3a7ba8" stroke-width="2"/>
        <line x1="-30" y1="-7" x2="30" y2="-7" stroke="#3a7ba8" stroke-width="2"/>
        <line x1="-30" y1="7" x2="30" y2="7" stroke="#3a7ba8" stroke-width="2"/>
        <line x1="-10" y1="-20" x2="-10" y2="20" stroke="#3a7ba8" stroke-width="2"/>
        <line x1="10" y1="-20" x2="10" y2="20" stroke="#3a7ba8" stroke-width="2"/>
        <rect x="10" y="-7" width="20" height="14" fill="#f59e0b"/>
      </g>
      <text x="1050" y="328" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="20">DB</text>
      <text x="1050" y="354" dominant-baseline="central" fill="#6b7280" font-size="13" letter-spacing="0.5">引き出せる</text>
    </g>

    <!-- カード3：商談（吹き出し2つ） -->
    <g>
      <rect x="900" y="404" width="240" height="108" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
      <g transform="translate(966, 458)">
        <!-- 左の吹き出し（お客さん） -->
        <rect x="-30" y="-22" width="30" height="18" rx="4" fill="#fff" stroke="#3a7ba8" stroke-width="2"/>
        <polygon points="-22,-4 -14,-4 -19,3" fill="#fff" stroke="#3a7ba8" stroke-width="2" stroke-linejoin="round"/>
        <!-- 右の吹き出し（こちら、オレンジ） -->
        <rect x="2" y="4" width="30" height="18" rx="4" fill="#fef3e2" stroke="#f59e0b" stroke-width="2"/>
        <polygon points="10,22 18,22 13,29" fill="#fef3e2" stroke="#f59e0b" stroke-width="2" stroke-linejoin="round"/>
      </g>
      <text x="1050" y="450" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="20">商談</text>
      <text x="1050" y="476" dominant-baseline="central" fill="#6b7280" font-size="13" letter-spacing="0.5">即レス</text>
    </g>
  </g>

  <!-- フッターキャッチ -->
  <g>
    <rect x="240" y="568" width="800" height="52" rx="26" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="272" cy="594" r="6" fill="#f59e0b"/>
    <text x="294" y="594" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="20" letter-spacing="0.5">過去の仕事を、商談しながら出せるようになる</text>
  </g>
</svg>
