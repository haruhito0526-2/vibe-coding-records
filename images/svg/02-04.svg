<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">THE ANALYSIS</text>
  <text x="80" y="112" font-weight="700" font-size="48" dominant-baseline="hanging">
    <tspan fill="#1f2937">functions.php × 2 を投げたら、</tspan><tspan fill="#3a7ba8">4つ返ってきた</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">CHAPTER 3 / Google AI Studio</text>

  <!-- ===== 左：INPUT ブロック ===== -->
  <g>
    <rect x="80" y="276" width="380" height="640" rx="12" fill="#3a7ba8" opacity="0.08" filter="url(#softShadow4)"/>
    <rect x="80" y="270" width="380" height="640" rx="12" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>

    <text x="270" y="316" text-anchor="middle" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="2" dominant-baseline="hanging">INPUT</text>
    <text x="270" y="354" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="32" dominant-baseline="hanging">2つのファイル</text>

    <!-- ファイル1：テーマA functions.php -->
    <g transform="translate(140, 430)">
      <!-- 書類アイコン（角折れ） -->
      <path d="M 0 0 L 180 0 L 220 40 L 220 240 L 0 240 Z" fill="#ffffff" stroke="#3a7ba8" stroke-width="2"/>
      <path d="M 180 0 L 180 40 L 220 40" fill="none" stroke="#3a7ba8" stroke-width="2"/>
      <!-- ファイル中身（コード行の表現） -->
      <line x1="20" y1="80" x2="180" y2="80" stroke="#a8d4ee" stroke-width="3" stroke-linecap="round"/>
      <line x1="20" y1="105" x2="140" y2="105" stroke="#a8d4ee" stroke-width="3" stroke-linecap="round"/>
      <line x1="40" y1="130" x2="160" y2="130" stroke="#a8d4ee" stroke-width="3" stroke-linecap="round"/>
      <line x1="20" y1="155" x2="170" y2="155" stroke="#a8d4ee" stroke-width="3" stroke-linecap="round"/>
      <line x1="40" y1="180" x2="120" y2="180" stroke="#a8d4ee" stroke-width="3" stroke-linecap="round"/>
      <line x1="20" y1="205" x2="160" y2="205" stroke="#a8d4ee" stroke-width="3" stroke-linecap="round"/>
      <!-- ラベル -->
      <text x="110" y="275" text-anchor="middle" fill="#3a7ba8" font-weight="700" font-size="20" dominant-baseline="hanging">テーマA / functions.php</text>
    </g>

    <!-- ファイル2：テーマB functions.php -->
    <g transform="translate(140, 730)">
      <!-- 書類アイコン -->
      <path d="M 0 0 L 180 0 L 220 40 L 220 110 L 0 110 Z" fill="#ffffff" stroke="#3a7ba8" stroke-width="2"/>
      <path d="M 180 0 L 180 40 L 220 40" fill="none" stroke="#3a7ba8" stroke-width="2"/>
      <line x1="20" y1="65" x2="180" y2="65" stroke="#a8d4ee" stroke-width="3" stroke-linecap="round"/>
      <line x1="20" y1="90" x2="140" y2="90" stroke="#a8d4ee" stroke-width="3" stroke-linecap="round"/>
      <text x="110" y="135" text-anchor="middle" fill="#3a7ba8" font-weight="700" font-size="20" dominant-baseline="hanging">テーマB / functions.php</text>
    </g>
  </g>

  <!-- ===== 矢印：INPUT → AI STUDIO ===== -->
  <g stroke="#a8d4ee" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="470" y1="540" x2="555" y2="565"/>
    <polyline points="549,556 562,567 555,580"/>
  </g>
  <g stroke="#a8d4ee" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="470" y1="800" x2="555" y2="635"/>
    <polyline points="563,640 562,624 549,628"/>
  </g>

  <!-- ===== 中央：AI STUDIO カード ===== -->
  <g>
    <rect x="568" y="406" width="380" height="320" rx="14" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow4)"/>
    <rect x="568" y="400" width="380" height="320" rx="14" fill="#3a7ba8" stroke="#3a7ba8" stroke-width="1"/>

    <!-- AI Studioのマーク（菱形） -->
    <g transform="translate(758, 480)">
      <polygon points="0,-30 30,0 0,30 -30,0" fill="#ffffff" opacity="0.95"/>
      <polygon points="0,-15 15,0 0,15 -15,0" fill="#3a7ba8"/>
    </g>

    <text x="758" y="530" text-anchor="middle" fill="#a8d4ee" font-weight="600" font-size="20" letter-spacing="3" dominant-baseline="hanging">GOOGLE AI STUDIO</text>
    <text x="758" y="568" text-anchor="middle" fill="#ffffff" font-weight="700" font-size="34" dominant-baseline="hanging">中身を読む</text>

    <rect x="723" y="630" width="70" height="2" rx="1" fill="#a8d4ee" opacity="0.6"/>
    <text x="758" y="654" text-anchor="middle" fill="#cfe1ee" font-weight="400" font-size="20" dominant-baseline="hanging">
      <tspan x="758" dy="0">長いコードを一度に読み込んで、</tspan>
      <tspan x="758" dy="28">まるごと分析する</tspan>
    </text>
  </g>

  <!-- ===== 矢印：AI STUDIO → OUTPUT ===== -->
  <g stroke="#a8d4ee" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="956" y1="370" x2="1055" y2="370"/>
    <polyline points="1049,363 1061,370 1049,377"/>
  </g>
  <g stroke="#a8d4ee" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="956" y1="525" x2="1055" y2="525"/>
    <polyline points="1049,518 1061,525 1049,532"/>
  </g>
  <g stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" fill="none">
    <line x1="956" y1="680" x2="1055" y2="680"/>
    <polyline points="1049,672 1061,680 1049,688"/>
  </g>
  <g stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" fill="none">
    <line x1="956" y1="835" x2="1055" y2="835"/>
    <polyline points="1049,828 1061,835 1049,843"/>
  </g>

  <!-- ===== 右：OUTPUT 4カード ===== -->
  <g>
    <rect x="1080" y="276" width="760" height="640" rx="12" fill="#3a7ba8" opacity="0.06" filter="url(#softShadow4)"/>
    <rect x="1080" y="270" width="760" height="640" rx="12" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>

    <text x="1100" y="288" fill="#5da8d4" font-weight="600" font-size="20" letter-spacing="2" dominant-baseline="hanging">OUTPUT / 4つの分析結果</text>

    <!-- カード1：テーマAの正体 -->
    <g>
      <rect x="1110" y="320" width="700" height="120" rx="10" fill="#ffffff" stroke="#cfe1ee" stroke-width="1.5"/>
      <circle cx="1148" cy="380" r="22" fill="#5da8d4"/>
      <text x="1148" y="380" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="22">1</text>
      <text x="1188" y="346" fill="#1f2937" font-weight="700" font-size="24" dominant-baseline="hanging">テーマAの正体</text>
      <text x="1188" y="386" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
        <tspan x="1188" dy="0">日本のブロガー向け『機能特化型』。</tspan>
        <tspan x="1188" dy="26">ランキング・SEO機能が内蔵</tspan>
      </text>
    </g>

    <!-- カード2：テーマBの正体 -->
    <g>
      <rect x="1110" y="475" width="700" height="120" rx="10" fill="#ffffff" stroke="#cfe1ee" stroke-width="1.5"/>
      <circle cx="1148" cy="535" r="22" fill="#5da8d4"/>
      <text x="1148" y="535" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="22">2</text>
      <text x="1188" y="501" fill="#1f2937" font-weight="700" font-size="24" dominant-baseline="hanging">テーマBの正体</text>
      <text x="1188" y="541" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
        <tspan x="1188" dy="0">海外製『デザイン自由度特化型』。</tspan>
        <tspan x="1188" dy="26">ページビルダー・ポートフォリオが強い</tspan>
      </text>
    </g>

    <!-- カード3：統合戦略（オレンジアクセント） -->
    <g>
      <rect x="1110" y="630" width="700" height="120" rx="10" fill="#fff8eb" stroke="#fde6c1" stroke-width="2"/>
      <circle cx="1148" cy="690" r="22" fill="#f59e0b"/>
      <text x="1148" y="690" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="22">3</text>
      <text x="1188" y="656" fill="#1f2937" font-weight="700" font-size="24" dominant-baseline="hanging">統合戦略</text>
      <text x="1188" y="696" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
        <tspan x="1188" dy="0">片方を土台にして、</tspan>
        <tspan x="1188" dy="26" font-weight="600" fill="#3a7ba8">もう片方の便利機能だけを移植する</tspan>
      </text>
    </g>

    <!-- カード4：ディレクトリ構成（オレンジアクセント） -->
    <g>
      <rect x="1110" y="785" width="700" height="120" rx="10" fill="#fff8eb" stroke="#fde6c1" stroke-width="2"/>
      <circle cx="1148" cy="845" r="22" fill="#f59e0b"/>
      <text x="1148" y="845" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="22">4</text>
      <text x="1188" y="811" fill="#1f2937" font-weight="700" font-size="24" dominant-baseline="hanging">ディレクトリ構成図</text>
      <text x="1188" y="851" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
        <tspan x="1188" dy="0">Cursor等のAIエディタ向けに、</tspan>
        <tspan x="1188" dy="26" font-weight="600" fill="#3a7ba8">フォルダ構成図まで添えて返ってきた</tspan>
      </text>
    </g>
  </g>

  <!-- フッター注釈 -->
  <g>
    <rect x="540" y="970" width="840" height="56" rx="28" fill="#ffffff" stroke="#d8e7f2" stroke-width="1.5"/>
    <circle cx="570" cy="998" r="5" fill="#5da8d4"/>
    <text x="592" y="998" dominant-baseline="central" fill="#3a7ba8" font-weight="600" font-size="22" letter-spacing="0.6">中身を見て、性格まで言い当てる。自分で調べてたら何日かかってたか分からない</text>
  </g>
</svg>
