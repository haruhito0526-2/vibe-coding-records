<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow65" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">CHAPTER 05 — THE LANDING</text>
  <text x="80" y="112" font-weight="700" font-size="44" dominant-baseline="hanging">
    <tspan fill="#1f2937">原稿から取り込みまで、</tspan><tspan fill="#3a7ba8">スマホ</tspan><tspan fill="#1f2937">で動く</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">VOL.6 — PIPELINE ②</text>
  <text x="1840" y="116" text-anchor="end" fill="#f59e0b" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">LANDING</text>

  <!-- 左側：スマホの中で動く95% -->
  <g>
    <text x="260" y="240" fill="#3a7ba8" font-weight="700" font-size="22" letter-spacing="3" dominant-baseline="hanging">スマホの中で動く  95%</text>

    <!-- 大きいスマホ -->
    <g transform="translate(260, 290)">
      <rect x="0" y="0" width="440" height="600" rx="36" fill="#fff" stroke="#3a7ba8" stroke-width="5" filter="url(#softShadow65)"/>
      <rect x="170" y="22" width="100" height="10" rx="5" fill="#a8d4ee"/>
      <rect x="22" y="50" width="396" height="528" rx="10" fill="#ecf2f7"/>

      <!-- 上部タブ -->
      <rect x="50" y="76" width="340" height="34" rx="17" fill="#fff" stroke="#a8d4ee" stroke-width="1.5"/>
      <circle cx="72" cy="93" r="6" fill="#5da8d4"/>
      <text x="92" y="93" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="14" letter-spacing="1">Claude</text>

      <!-- ステップ1：原稿 -->
      <g transform="translate(50, 134)">
        <rect x="0" y="0" width="340" height="80" rx="10" fill="#fff" stroke="#a8d4ee" stroke-width="2"/>
        <circle cx="32" cy="40" r="20" fill="#ecf2f7"/>
        <text x="32" y="40" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="16">1</text>
        <text x="68" y="34" fill="#1f2937" font-weight="700" font-size="18" dominant-baseline="hanging">原稿（チャットで校正）</text>
        <text x="68" y="58" fill="#6b7280" font-size="13" dominant-baseline="hanging">考えると体験は、自分が残す</text>
      </g>

      <!-- 矢印 -->
      <g transform="translate(220, 222)" stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linecap="round">
        <line x1="0" y1="0" x2="0" y2="14"/>
        <polyline points="-6,8 0,14 6,8"/>
      </g>

      <!-- ステップ2：画像 -->
      <g transform="translate(50, 244)">
        <rect x="0" y="0" width="340" height="80" rx="10" fill="#fff" stroke="#fde6c1" stroke-width="2"/>
        <circle cx="32" cy="40" r="20" fill="#fef3e2"/>
        <text x="32" y="40" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="16">2</text>
        <text x="68" y="34" fill="#1f2937" font-weight="700" font-size="18" dominant-baseline="hanging">画像（API ＋ SVG）</text>
        <text x="68" y="58" fill="#6b7280" font-size="13" dominant-baseline="hanging">写真風はAPI、図解はSVG</text>
      </g>

      <!-- 矢印 -->
      <g transform="translate(220, 332)" stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linecap="round">
        <line x1="0" y1="0" x2="0" y2="14"/>
        <polyline points="-6,8 0,14 6,8"/>
      </g>

      <!-- ステップ3：XML変換 -->
      <g transform="translate(50, 354)">
        <rect x="0" y="0" width="340" height="80" rx="10" fill="#fff" stroke="#fde6c1" stroke-width="2"/>
        <circle cx="32" cy="40" r="20" fill="#fef3e2"/>
        <text x="32" y="40" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="16">3</text>
        <text x="68" y="34" fill="#1f2937" font-weight="700" font-size="18" dominant-baseline="hanging">XML変換ツール</text>
        <text x="68" y="58" fill="#6b7280" font-size="13" dominant-baseline="hanging">取り込み形に整える</text>
      </g>

      <!-- 矢印 -->
      <g transform="translate(220, 442)" stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linecap="round">
        <line x1="0" y1="0" x2="0" y2="14"/>
        <polyline points="-6,8 0,14 6,8"/>
      </g>

      <!-- ステップ4：取り込みファイル完成 -->
      <g transform="translate(50, 464)">
        <rect x="0" y="0" width="340" height="80" rx="10" fill="#ecf2f7" stroke="#5da8d4" stroke-width="2.5"/>
        <circle cx="32" cy="40" r="20" fill="#fff"/>
        <text x="32" y="40" text-anchor="middle" dominant-baseline="central" fill="#5da8d4" font-weight="700" font-size="16">✓</text>
        <text x="68" y="34" fill="#1f2937" font-weight="700" font-size="18" dominant-baseline="hanging">取り込み用ファイル完成</text>
        <text x="68" y="58" fill="#6b7280" font-size="13" dominant-baseline="hanging">スマホの作業はここまで</text>
      </g>
    </g>
  </g>

  <!-- 中央：移動矢印 -->
  <g transform="translate(820, 580)">
    <g stroke="#6b7280" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="0" y1="0" x2="100" y2="0"/>
      <polyline points="88,-9 102,0 88,9"/>
    </g>
    <text x="50" y="-22" text-anchor="middle" fill="#6b7280" font-size="14">最後の操作</text>
    <text x="50" y="32" text-anchor="middle" fill="#6b7280" font-size="14">だけPCで</text>
  </g>

  <!-- 右側：残り5%はPC -->
  <g>
    <text x="1140" y="240" fill="#6b7280" font-weight="700" font-size="22" letter-spacing="3" dominant-baseline="hanging">残り 5%  PCで</text>

    <!-- PCモニター -->
    <g transform="translate(1220, 380)">
      <rect x="0" y="0" width="380" height="240" rx="12" fill="#fff" stroke="#6b7280" stroke-width="3"/>
      <rect x="14" y="14" width="352" height="200" rx="6" fill="#ecf2f7"/>
      <rect x="160" y="240" width="60" height="16" fill="#6b7280"/>
      <rect x="120" y="256" width="140" height="10" rx="3" fill="#6b7280"/>

      <!-- 画面内：noteの管理画面 -->
      <text x="190" y="44" text-anchor="middle" fill="#3a7ba8" font-weight="700" font-size="14" letter-spacing="1">noteの管理画面</text>
      <line x1="40" y1="62" x2="340" y2="62" stroke="#a8d4ee" stroke-width="1.5"/>

      <!-- 残り作業1 -->
      <g transform="translate(40, 84)">
        <rect x="0" y="0" width="300" height="40" rx="6" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="8" fill="#f59e0b"/>
        <text x="20" y="20" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="700" font-size="11">1</text>
        <text x="40" y="20" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="13">アイキャッチをアップロード</text>
      </g>

      <!-- 残り作業2 -->
      <g transform="translate(40, 134)">
        <rect x="0" y="0" width="300" height="40" rx="6" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="8" fill="#f59e0b"/>
        <text x="20" y="20" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="700" font-size="11">2</text>
        <text x="40" y="20" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="13">XMLファイルを取り込む</text>
      </g>

      <text x="190" y="194" text-anchor="middle" fill="#6b7280" font-size="12">どちらもブラウザの管理画面操作</text>
    </g>

    <!-- 注釈：自動化しない理由 -->
    <g transform="translate(1140, 660)">
      <rect x="0" y="0" width="540" height="170" rx="14" fill="#fef3e2" stroke="#fde6c1" stroke-width="2"/>
      <text x="270" y="34" text-anchor="middle" fill="#f59e0b" font-weight="700" font-size="16" letter-spacing="2">この5%は、無理に自動化しない</text>
      <line x1="40" y1="60" x2="500" y2="60" stroke="#fde6c1" stroke-width="1.5"/>
      <text x="270" y="86" text-anchor="middle" fill="#1f2937" font-weight="500" font-size="15">「ここまで来たら出していい」を</text>
      <text x="270" y="112" text-anchor="middle" fill="#1f2937" font-weight="500" font-size="15">自分で確かめる手順に近い</text>
      <text x="270" y="142" text-anchor="middle" fill="#6b7280" font-size="13">（前編からの設計：考えると体験は、自分の側に残す）</text>
    </g>
  </g>

  <!-- フッター -->
  <g>
    <rect x="380" y="940" width="1160" height="56" rx="28" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="414" cy="968" r="6" fill="#f59e0b"/>
    <text x="438" y="968" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="22" letter-spacing="0.8">原稿〜取り込みまでスマホで動き、最後の操作だけ手元に残す</text>
  </g>
</svg>
