<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="100%" preserveAspectRatio="xMidYMid meet">
  <rect width="1280" height="670" fill="#f8f9fa"/>

  <text x="80" y="60" fill="#1f2937" font-weight="700" font-size="50" dominant-baseline="hanging">顧客ごとに資料の閲覧具合がわかる</text>
  <line x1="80" y1="140" x2="260" y2="140" stroke="#f59e0b" stroke-width="5"/>

  <!-- 左：提案資料 -->
  <g transform="translate(60, 230)">
    <rect width="320" height="340" rx="20" fill="#fff" stroke="#3a7ba8" stroke-width="4"/>
    <text x="160" y="70" text-anchor="middle" font-weight="700" font-size="50" fill="#1f2937">提案資料</text>
    <g transform="translate(105, 140)">
      <rect width="110" height="140" rx="6" fill="#eff6fb" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="20" y1="36" x2="90" y2="36" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="20" y1="60" x2="90" y2="60" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="20" y1="84" x2="90" y2="84" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="20" y1="108" x2="70" y2="108" stroke="#3a7ba8" stroke-width="3"/>
    </g>
  </g>

  <!-- 矢印1（短く） -->
  <g transform="translate(405, 400)">
    <path d="M 0,0 L 40,0" stroke="#f59e0b" stroke-width="10" stroke-linecap="round"/>
    <polygon points="36,-18 60,0 36,18" fill="#f59e0b"/>
  </g>

  <!-- 中央：GA4で観測 -->
  <g transform="translate(490, 230)">
    <rect width="320" height="340" rx="20" fill="#eff6fb" stroke="#3a7ba8" stroke-width="4"/>
    <text x="160" y="70" text-anchor="middle" font-weight="700" font-size="50" fill="#1f2937">GA4で観測</text>
    <g transform="translate(80, 140)">
      <line x1="0" y1="140" x2="160" y2="140" stroke="#3a7ba8" stroke-width="3"/>
      <line x1="0" y1="20" x2="0" y2="140" stroke="#3a7ba8" stroke-width="3"/>
      <polyline points="0,120 40,90 80,50 120,70 160,22" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="0" cy="120" r="6" fill="#f59e0b"/>
      <circle cx="40" cy="90" r="6" fill="#f59e0b"/>
      <circle cx="80" cy="50" r="6" fill="#f59e0b"/>
      <circle cx="120" cy="70" r="6" fill="#f59e0b"/>
      <circle cx="160" cy="22" r="6" fill="#f59e0b"/>
    </g>
  </g>

  <!-- 矢印2（短く） -->
  <g transform="translate(835, 400)">
    <path d="M 0,0 L 40,0" stroke="#3a7ba8" stroke-width="10" stroke-linecap="round"/>
    <polygon points="36,-18 60,0 36,18" fill="#3a7ba8"/>
  </g>

  <!-- 右：追加対応 -->
  <g transform="translate(920, 230)">
    <rect width="320" height="340" rx="20" fill="#fef3e2" stroke="#f59e0b" stroke-width="4"/>
    <text x="160" y="70" text-anchor="middle" font-weight="700" font-size="50" fill="#1f2937">追加対応</text>
    <g transform="translate(85, 140)">
      <rect width="150" height="100" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="3"/>
      <polygon points="40,100 60,100 50,120" fill="#fff" stroke="#f59e0b" stroke-width="3" stroke-linejoin="round"/>
      <line x1="20" y1="34" x2="130" y2="34" stroke="#f59e0b" stroke-width="3"/>
      <line x1="20" y1="56" x2="110" y2="56" stroke="#f59e0b" stroke-width="3"/>
      <line x1="20" y1="78" x2="90" y2="78" stroke="#f59e0b" stroke-width="3"/>
    </g>
  </g>
</svg>
