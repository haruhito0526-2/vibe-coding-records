<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow45" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">2 PITFALLS, 2 BYPASSES</text>
  <text x="80" y="112" font-weight="700" font-size="44" dominant-baseline="hanging">
    <tspan fill="#1f2937">ログをAIに読ませたら、</tspan><tspan fill="#3a7ba8">こんなことをしていた</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">CH.4 — DEBRIEF</text>
  <text x="1840" y="116" text-anchor="end" fill="#f59e0b" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">DECODED</text>

  <!-- 左カード：PITFALL 1 -->
  <g>
    <rect x="80" y="240" width="850" height="640" rx="14" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow45)"/>
    <rect x="80" y="234" width="850" height="640" rx="14" fill="#ffffff" stroke="#ecf2f7" stroke-width="1.5"/>

    <rect x="110" y="270" width="180" height="36" rx="18" fill="#ecf2f7"/>
    <text x="200" y="288" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="18" letter-spacing="1.4">PITFALL 1</text>

    <text x="110" y="340" fill="#1f2937" font-weight="700" font-size="32" dominant-baseline="hanging">人間用の確認画面で、</text>
    <text x="110" y="380" fill="#1f2937" font-weight="700" font-size="32" dominant-baseline="hanging">機械が止まる</text>
    <text x="110" y="430" fill="#6b7280" font-weight="500" font-size="18" dominant-baseline="hanging">登録ページに「これでOK?」が挟まっていた</text>

    <!-- 図解：確認画面 -->
    <g transform="translate(110, 490)">
      <!-- ブラウザ枠 -->
      <rect x="0" y="0" width="380" height="240" rx="10" fill="#ffffff" stroke="#a8d4ee" stroke-width="2"/>
      <rect x="0" y="0" width="380" height="34" rx="10" fill="#ecf2f7"/>
      <circle cx="20" cy="17" r="5" fill="#b8413c"/>
      <circle cx="40" cy="17" r="5" fill="#f59e0b"/>
      <circle cx="60" cy="17" r="5" fill="#2f8a4e"/>

      <!-- 確認モーダル -->
      <rect x="40" y="80" width="300" height="120" rx="8" fill="#ffffff" stroke="#3a7ba8" stroke-width="2"/>
      <text x="190" y="110" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="18">これで登録しますか？</text>
      <rect x="80" y="140" width="100" height="40" rx="8" fill="#ecf2f7" stroke="#a8d4ee" stroke-width="1.5"/>
      <text x="130" y="160" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-weight="600" font-size="16">戻る</text>
      <rect x="200" y="140" width="100" height="40" rx="8" fill="#3a7ba8"/>
      <text x="250" y="160" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="16">OK</text>

      <!-- 機械が止まっている矢印 -->
      <g stroke="#b8413c" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="-30" y1="160" x2="80" y2="160"/>
        <polyline points="70,153 82,160 70,167"/>
      </g>
      <text x="-30" y="140" fill="#b8413c" font-weight="700" font-size="14" dominant-baseline="hanging">機械</text>

      <!-- 止まっているマーク -->
      <g transform="translate(330, 130)">
        <circle cx="0" cy="0" r="22" fill="#fae5e3" stroke="#b8413c" stroke-width="2"/>
        <text x="0" y="0" text-anchor="middle" dominant-baseline="central" fill="#b8413c" font-weight="700" font-size="22">!</text>
      </g>
    </g>

    <!-- 解決策 -->
    <g transform="translate(110, 760)">
      <rect x="0" y="0" width="790" height="80" rx="10" fill="#ecf2f7"/>
      <text x="20" y="22" fill="#3a7ba8" font-weight="700" font-size="14" letter-spacing="1.4" dominant-baseline="hanging">SOLUTION</text>
      <text x="20" y="50" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">人間の目で動かしてみたら、一発で「あ、止まってる」と分かる</text>
    </g>
  </g>

  <!-- 右カード：PITFALL 2 -->
  <g>
    <rect x="990" y="240" width="850" height="640" rx="14" fill="#f59e0b" opacity="0.12" filter="url(#softShadow45)"/>
    <rect x="990" y="234" width="850" height="640" rx="14" fill="#ffffff" stroke="#fde6c1" stroke-width="2"/>

    <rect x="1020" y="270" width="180" height="36" rx="18" fill="#fef3e2"/>
    <text x="1110" y="288" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="18" letter-spacing="1.4">PITFALL 2</text>

    <text x="1020" y="340" fill="#1f2937" font-weight="700" font-size="32" dominant-baseline="hanging">特定のフォームだけ、</text>
    <text x="1020" y="380" fill="#1f2937" font-weight="700" font-size="32" dominant-baseline="hanging">URLが空っぽで届く</text>
    <text x="1020" y="430" fill="#6b7280" font-weight="500" font-size="18" dominant-baseline="hanging">他は記録できているのに、1つだけおかしい</text>

    <!-- 図解：状態を画面に出す -->
    <g transform="translate(1020, 490)">
      <!-- ブラウザ枠 -->
      <rect x="0" y="0" width="380" height="240" rx="10" fill="#ffffff" stroke="#fde6c1" stroke-width="2"/>
      <rect x="0" y="0" width="380" height="34" rx="10" fill="#fef3e2"/>
      <circle cx="20" cy="17" r="5" fill="#b8413c"/>
      <circle cx="40" cy="17" r="5" fill="#f59e0b"/>
      <circle cx="60" cy="17" r="5" fill="#2f8a4e"/>

      <!-- フォームの絵 -->
      <rect x="30" y="60" width="320" height="30" rx="4" fill="#ecf2f7"/>
      <rect x="30" y="100" width="320" height="30" rx="4" fill="#ecf2f7"/>
      <rect x="30" y="140" width="320" height="30" rx="4" fill="#ecf2f7"/>

      <!-- デバッグ表示の付箋 -->
      <g transform="translate(30, 190)">
        <rect x="0" y="0" width="320" height="36" rx="6" fill="#fef3e2" stroke="#f59e0b" stroke-width="2"/>
        <text x="160" y="18" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="15">いま、このフォームは ID: 19963 です</text>
      </g>

      <!-- 虫眼鏡 -->
      <g transform="translate(390, 200)">
        <circle cx="0" cy="0" r="22" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
        <line x1="16" y1="16" x2="32" y2="32" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
      </g>
      <text x="395" y="244" text-anchor="middle" fill="#f59e0b" font-weight="700" font-size="14" dominant-baseline="hanging">目で見て切り分け</text>
    </g>

    <!-- 解決策 -->
    <g transform="translate(1020, 760)">
      <rect x="0" y="0" width="790" height="80" rx="10" fill="#fef3e2"/>
      <text x="20" y="22" fill="#f59e0b" font-weight="700" font-size="14" letter-spacing="1.4" dominant-baseline="hanging">SOLUTION</text>
      <text x="20" y="50" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">画面に状態を出す仕掛けを途中に挟んで、目視で原因を切り分ける</text>
    </g>
  </g>

  <!-- フッター -->
  <g>
    <rect x="280" y="940" width="1360" height="56" rx="28" fill="#ffffff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="314" cy="968" r="6" fill="#f59e0b"/>
    <text x="338" y="968" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="22" letter-spacing="0.8">わからないものを「わかる形にする」開発を、遠慮なく挟む</text>
  </g>
</svg>
