<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow44" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">DEV LOOP</text>
  <text x="80" y="112" font-weight="700" font-size="44" dominant-baseline="hanging">
    <tspan fill="#1f2937">やってる最中は、</tspan><tspan fill="#3a7ba8">何が起きてるか分かってない</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">CH.3 — META</text>
  <text x="1840" y="116" text-anchor="end" fill="#3a7ba8" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">FOG OF WAR</text>

  <!-- 中央のループ図 -->
  <g transform="translate(960, 580)">
    <!-- 背景円 -->
    <circle cx="0" cy="0" r="320" fill="#ffffff" stroke="#ecf2f7" stroke-width="2" filter="url(#softShadow44)"/>
    <circle cx="0" cy="0" r="320" fill="#5da8d4" opacity="0.04"/>

    <!-- 中央：?マーク -->
    <circle cx="0" cy="0" r="100" fill="#ffffff" stroke="#5da8d4" stroke-width="3" stroke-dasharray="6 6"/>
    <text x="0" y="-12" text-anchor="middle" dominant-baseline="central" fill="#5da8d4" font-weight="700" font-size="80">?</text>
    <text x="0" y="56" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-weight="600" font-size="16">本人は</text>
    <text x="0" y="78" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-weight="600" font-size="16">わかっていない</text>

    <!-- ループの矢印（円弧） -->
    <g fill="none" stroke="#5da8d4" stroke-width="3" stroke-linecap="round" opacity="0.6">
      <path d="M -180,-180 A 250,250 0 0,1 180,-180" stroke-dasharray="6 8"/>
      <path d="M 180,-180 A 250,250 0 0,1 240,60" stroke-dasharray="6 8"/>
      <path d="M 240,60 A 250,250 0 0,1 0,260" stroke-dasharray="6 8"/>
      <path d="M 0,260 A 250,250 0 0,1 -240,60" stroke-dasharray="6 8"/>
      <path d="M -240,60 A 250,250 0 0,1 -180,-180" stroke-dasharray="6 8"/>
    </g>

    <!-- ループのステップ（5つを円周に配置） -->
    <!-- STEP 1: AIに頼む（上） -->
    <g transform="translate(0, -260)">
      <rect x="-100" y="-40" width="200" height="80" rx="14" fill="#ffffff" stroke="#3a7ba8" stroke-width="2"/>
      <text x="0" y="-12" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="14" letter-spacing="1.2">STEP 1</text>
      <text x="0" y="14" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="20">AIに頼む</text>
    </g>

    <!-- STEP 2: コードをもらう（右上） -->
    <g transform="translate(248, -80)">
      <rect x="-100" y="-40" width="200" height="80" rx="14" fill="#ffffff" stroke="#3a7ba8" stroke-width="2"/>
      <text x="0" y="-12" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="14" letter-spacing="1.2">STEP 2</text>
      <text x="0" y="14" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="20">コードをもらう</text>
    </g>

    <!-- STEP 3: 貼り付けてテスト（右下） -->
    <g transform="translate(154, 220)">
      <rect x="-110" y="-40" width="220" height="80" rx="14" fill="#ffffff" stroke="#3a7ba8" stroke-width="2"/>
      <text x="0" y="-12" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="14" letter-spacing="1.2">STEP 3</text>
      <text x="0" y="14" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="20">貼り付けてテスト</text>
    </g>

    <!-- STEP 4: 動かない（左下） -->
    <g transform="translate(-154, 220)">
      <rect x="-100" y="-40" width="200" height="80" rx="14" fill="#fae5e3" stroke="#b8413c" stroke-width="2"/>
      <text x="0" y="-12" text-anchor="middle" dominant-baseline="central" fill="#b8413c" font-weight="700" font-size="14" letter-spacing="1.2">STEP 4</text>
      <text x="0" y="14" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="20">動かない</text>
    </g>

    <!-- STEP 5: AIに相談（左上） -->
    <g transform="translate(-248, -80)">
      <rect x="-100" y="-40" width="200" height="80" rx="14" fill="#ffffff" stroke="#3a7ba8" stroke-width="2"/>
      <text x="0" y="-12" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="14" letter-spacing="1.2">STEP 5</text>
      <text x="0" y="14" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="20">AIに相談</text>
    </g>
  </g>

  <!-- 左の補足 -->
  <g transform="translate(80, 280)">
    <rect x="0" y="0" width="380" height="180" rx="14" fill="#ffffff" stroke="#ecf2f7" stroke-width="1.5"/>
    <text x="20" y="22" fill="#5da8d4" font-weight="700" font-size="14" letter-spacing="1.4" dominant-baseline="hanging">REALITY</text>
    <text x="20" y="50" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">何回も詰まって、</text>
    <text x="20" y="78" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">その都度AIに相談して、</text>
    <text x="20" y="106" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">なんとか動かして──を</text>
    <text x="20" y="134" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">ひたすら繰り返した</text>
  </g>

  <!-- 右の補足 -->
  <g transform="translate(1460, 280)">
    <rect x="0" y="0" width="380" height="180" rx="14" fill="#fef3e2" stroke="#fde6c1" stroke-width="1.5"/>
    <text x="20" y="22" fill="#f59e0b" font-weight="700" font-size="14" letter-spacing="1.4" dominant-baseline="hanging">RESULT</text>
    <text x="20" y="50" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">最終的に「動いた」</text>
    <text x="20" y="78" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">という結果だけが残った。</text>
    <text x="20" y="118" fill="#6b7280" font-weight="500" font-size="16" dominant-baseline="hanging">何が引っかかったのか、</text>
    <text x="20" y="142" fill="#6b7280" font-weight="500" font-size="16" dominant-baseline="hanging">どう抜けたかは覚えてない</text>
  </g>

  <!-- フッター -->
  <g>
    <rect x="320" y="940" width="1280" height="56" rx="28" fill="#ffffff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="354" cy="968" r="6" fill="#f59e0b"/>
    <text x="378" y="968" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="22" letter-spacing="0.8">対話のログをAIに読ませて、後から構造が見えた</text>
  </g>
</svg>
