<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow41" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">FORM → MULTI-DELIVERY</text>
  <text x="80" y="112" font-weight="700" font-size="44" dominant-baseline="hanging">
    <tspan fill="#1f2937">申し込みフォーム送信</tspan><tspan fill="#3a7ba8">1回</tspan><tspan fill="#1f2937">で、</tspan><tspan fill="#f59e0b">5つの処理</tspan><tspan fill="#1f2937">が同時に走る</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">VOL.4 — FORM AUTOMATION</text>
  <text x="1840" y="116" text-anchor="end" fill="#f59e0b" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">LIVE</text>

  <!-- 左：フォームカード -->
  <g>
    <rect x="120" y="320" width="500" height="460" rx="14" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow41)"/>
    <rect x="120" y="314" width="500" height="460" rx="14" fill="#ffffff" stroke="#ecf2f7" stroke-width="1.5"/>

    <!-- バッジ -->
    <rect x="150" y="350" width="180" height="36" rx="18" fill="#ecf2f7"/>
    <text x="240" y="368" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="18" letter-spacing="1.5">CONTACT FORM</text>

    <!-- フォームの絵 -->
    <g transform="translate(170, 410)">
      <rect x="0" y="0" width="400" height="44" rx="6" fill="#ecf2f7" stroke="#a8d4ee" stroke-width="1.5"/>
      <text x="14" y="22" dominant-baseline="central" fill="#6b7280" font-size="16">お名前</text>
      <rect x="0" y="60" width="400" height="44" rx="6" fill="#ecf2f7" stroke="#a8d4ee" stroke-width="1.5"/>
      <text x="14" y="82" dominant-baseline="central" fill="#6b7280" font-size="16">メールアドレス</text>
      <rect x="0" y="120" width="400" height="120" rx="6" fill="#ecf2f7" stroke="#a8d4ee" stroke-width="1.5"/>
      <text x="14" y="142" dominant-baseline="central" fill="#6b7280" font-size="16">お問い合わせ内容</text>

      <!-- メルマガチェックボックス -->
      <rect x="0" y="260" width="22" height="22" rx="4" fill="#f59e0b" stroke="#f59e0b"/>
      <polyline points="4,272 10,278 20,265" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="32" y="271" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="16">メルマガ登録を希望する</text>
    </g>

    <!-- 送信ボタン -->
    <rect x="220" y="700" width="300" height="56" rx="28" fill="#3a7ba8"/>
    <text x="370" y="728" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="22">送信する</text>
  </g>

  <!-- 中央：1回の送信ラベル -->
  <g>
    <circle cx="700" cy="544" r="56" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
    <text x="700" y="534" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="18" letter-spacing="1.4">1 SEND</text>
    <text x="700" y="558" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="14">1回の送信で</text>
  </g>

  <!-- 中央→右への放射状の矢印 -->
  <g stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <line x1="760" y1="500" x2="1100" y2="380"/>
    <polyline points="1086,374 1102,380 1090,388"/>
    <line x1="765" y1="525" x2="1100" y2="475"/>
    <polyline points="1086,470 1102,475 1090,484"/>
    <line x1="765" y1="544" x2="1100" y2="572"/>
    <polyline points="1090,565 1102,572 1090,580"/>
    <line x1="765" y1="568" x2="1100" y2="668"/>
    <polyline points="1090,660 1102,668 1090,676"/>
    <line x1="760" y1="595" x2="1100" y2="765"/>
    <polyline points="1090,757 1102,765 1090,772"/>
  </g>

  <!-- 右：5つの宛先 -->
  <g font-family="sans-serif">
    <!-- 1. 管理者メール通知 -->
    <g transform="translate(1100, 350)">
      <rect x="0" y="0" width="700" height="72" rx="10" fill="#ffffff" stroke="#fde6c1" stroke-width="2"/>
      <rect x="0" y="0" width="60" height="72" rx="10" fill="#fef3e2"/>
      <text x="30" y="36" text-anchor="middle" dominant-baseline="central" font-size="28">📧</text>
      <text x="80" y="22" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">管理者にメール通知</text>
      <text x="80" y="46" fill="#6b7280" font-weight="500" font-size="14" dominant-baseline="hanging">受付内容を指定アドレスへ</text>
    </g>

    <!-- 2. ユーザー自動返信 -->
    <g transform="translate(1100, 445)">
      <rect x="0" y="0" width="700" height="72" rx="10" fill="#ffffff" stroke="#fde6c1" stroke-width="2"/>
      <rect x="0" y="0" width="60" height="72" rx="10" fill="#fef3e2"/>
      <text x="30" y="36" text-anchor="middle" dominant-baseline="central" font-size="28">✉️</text>
      <text x="80" y="22" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">送信者に自動返信メール</text>
      <text x="80" y="46" fill="#6b7280" font-weight="500" font-size="14" dominant-baseline="hanging">受付完了をお知らせ</text>
    </g>

    <!-- 3. サンクスページへ -->
    <g transform="translate(1100, 540)">
      <rect x="0" y="0" width="700" height="72" rx="10" fill="#ffffff" stroke="#fde6c1" stroke-width="2"/>
      <rect x="0" y="0" width="60" height="72" rx="10" fill="#fef3e2"/>
      <text x="30" y="36" text-anchor="middle" dominant-baseline="central" font-size="28">✓</text>
      <text x="80" y="22" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">サンクスページへ移動</text>
      <text x="80" y="46" fill="#6b7280" font-weight="500" font-size="14" dominant-baseline="hanging">CV計測のための着地ページ</text>
    </g>

    <!-- 4. メルマガ登録 -->
    <g transform="translate(1100, 635)">
      <rect x="0" y="0" width="700" height="72" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2.5"/>
      <rect x="0" y="0" width="60" height="72" rx="10" fill="#f59e0b"/>
      <text x="30" y="36" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="22">★</text>
      <text x="80" y="22" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">メルマガ登録</text>
      <text x="80" y="46" fill="#6b7280" font-weight="500" font-size="14" dominant-baseline="hanging">本人がチェックボックスをONにした場合だけ</text>
    </g>

    <!-- 5. スプレッドシート -->
    <g transform="translate(1100, 730)">
      <rect x="0" y="0" width="700" height="72" rx="10" fill="#ffffff" stroke="#fde6c1" stroke-width="2"/>
      <rect x="0" y="0" width="60" height="72" rx="10" fill="#fef3e2"/>
      <text x="30" y="36" text-anchor="middle" dominant-baseline="central" font-size="26">📊</text>
      <text x="80" y="22" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">スプレッドシートに記録</text>
      <text x="80" y="46" fill="#6b7280" font-weight="500" font-size="14" dominant-baseline="hanging">問い合わせ履歴の蓄積</text>
    </g>
  </g>

  <!-- フッター -->
  <g>
    <rect x="350" y="940" width="1220" height="56" rx="28" fill="#ffffff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="384" cy="968" r="6" fill="#f59e0b"/>
    <text x="408" y="968" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="22" letter-spacing="0.8">中継だらけの動線を、1回の送信に畳む</text>
  </g>
</svg>
