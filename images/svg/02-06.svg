<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow6" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">10 DAYS TIMELINE</text>
  <text x="80" y="112" font-weight="700" font-size="48" dominant-baseline="hanging">
    <tspan fill="#1f2937">壊れた朝から、</tspan><tspan fill="#3a7ba8">「準備完了」までの10日間</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">2025.12.09 - 2025.12.18</text>
  <text x="1840" y="116" text-anchor="end" fill="#3a7ba8" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">10 DAYS</text>

  <!-- カード1 : 12/9 START 壊れた朝→決断（オレンジ強調） -->
  <g>
    <rect x="80" y="280" width="320" height="640" rx="12" fill="#f59e0b" opacity="0.12" filter="url(#softShadow6)"/>
    <rect x="80" y="274" width="320" height="640" rx="12" fill="#ffffff" stroke="#fde6c1" stroke-width="2"/>
    <rect x="195" y="324" width="90" height="90" rx="14" fill="#fef3e2"/>
    <text x="240" y="380" text-anchor="middle" font-size="44" fill="#f59e0b" font-weight="700" dominant-baseline="central">★</text>
    <text x="240" y="442" text-anchor="middle" fill="#f59e0b" font-weight="700" font-size="22" letter-spacing="1.2" dominant-baseline="hanging">2025.12.09</text>
    <text x="240" y="490" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="30" dominant-baseline="hanging">壊れた朝、決断</text>
    <rect x="222" y="552" width="36" height="2" rx="1" fill="#f59e0b"/>
    <text x="240" y="580" text-anchor="middle" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
      <tspan x="240" dy="0">画面にショートコード露出</tspan>
      <tspan x="240" dy="32">AIに「どうしたら」と相談</tspan>
      <tspan x="240" dy="32">「隣の土地に建てる」</tspan>
      <tspan x="240" dy="48" font-weight="600" fill="#3a7ba8">外注400万円より早い、を選択</tspan>
    </text>
    <circle cx="240" cy="274" r="30" fill="#f59e0b"/>
    <text x="240" y="274" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="30">1</text>
  </g>

  <!-- カード2 : 12/10-13 準備（4日） -->
  <g>
    <rect x="440" y="280" width="320" height="640" rx="12" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow6)"/>
    <rect x="440" y="274" width="320" height="640" rx="12" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>
    <rect x="555" y="324" width="90" height="90" rx="14" fill="#eaf4fb"/>
    <g transform="translate(580, 350)" stroke="#3a7ba8" stroke-width="2.5" fill="none" stroke-linecap="round">
      <rect x="0" y="0" width="40" height="32" rx="3"/>
      <line x1="0" y1="10" x2="40" y2="10"/>
      <circle cx="6" cy="5" r="1.5" fill="#3a7ba8"/>
      <circle cx="12" cy="5" r="1.5" fill="#3a7ba8"/>
    </g>
    <text x="600" y="442" text-anchor="middle" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="1.2" dominant-baseline="hanging">12.10 - 12.13</text>
    <text x="600" y="490" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="30" dominant-baseline="hanging">隣の土地を準備</text>
    <rect x="582" y="552" width="36" height="2" rx="1" fill="#a8d4ee"/>
    <text x="600" y="580" text-anchor="middle" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
      <tspan x="600" dy="0">Localで空のWP環境を立ち上げ</tspan>
      <tspan x="600" dy="32">Antigravityを採用</tspan>
      <tspan x="600" dy="32">ワイヤーフレームやヘッダーの</tspan>
      <tspan x="600" dy="32">方針をAIと相談して決める</tspan>
      <tspan x="600" dy="48" font-weight="600" fill="#3a7ba8">「決め事」のフェーズ</tspan>
    </text>
    <circle cx="600" cy="274" r="30" fill="#a8d4ee"/>
    <text x="600" y="274" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="30">2</text>
  </g>

  <!-- カード3 : 12/14 起動 -->
  <g>
    <rect x="800" y="280" width="320" height="640" rx="12" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow6)"/>
    <rect x="800" y="274" width="320" height="640" rx="12" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>
    <rect x="915" y="324" width="90" height="90" rx="14" fill="#eaf4fb"/>
    <g transform="translate(940, 350)" stroke="#3a7ba8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="14,8 4,18 14,28"/>
      <polyline points="26,8 36,18 26,28"/>
    </g>
    <text x="960" y="442" text-anchor="middle" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="1.2" dominant-baseline="hanging">12.14</text>
    <text x="960" y="490" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="30" dominant-baseline="hanging">建設スタート</text>
    <rect x="942" y="552" width="36" height="2" rx="1" fill="#a8d4ee"/>
    <text x="960" y="580" text-anchor="middle" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
      <tspan x="960" dy="0">Antigravityに</tspan>
      <tspan x="960" dy="32">「動画制作サービスの</tspan>
      <tspan x="960" dy="32">リニューアル」と告げる</tspan>
      <tspan x="960" dy="32">PHP・CSSファイルを送って</tspan>
      <tspan x="960" dy="48" font-weight="600" fill="#3a7ba8">固定ページ依頼を開始</tspan>
    </text>
    <circle cx="960" cy="274" r="30" fill="#a8d4ee"/>
    <text x="960" y="274" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="30">3</text>
  </g>

  <!-- カード4 : 12/15-17 構築 -->
  <g>
    <rect x="1160" y="280" width="320" height="640" rx="12" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow6)"/>
    <rect x="1160" y="274" width="320" height="640" rx="12" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>
    <rect x="1275" y="324" width="90" height="90" rx="14" fill="#eaf4fb"/>
    <g transform="translate(1300, 348)" stroke="#3a7ba8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="0" width="36" height="36" rx="2"/>
      <line x1="2" y1="12" x2="38" y2="12"/>
      <line x1="2" y1="24" x2="38" y2="24"/>
    </g>
    <text x="1320" y="442" text-anchor="middle" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="1.2" dominant-baseline="hanging">12.15 - 12.17</text>
    <text x="1320" y="490" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="30" dominant-baseline="hanging">作り込み</text>
    <rect x="1302" y="552" width="36" height="2" rx="1" fill="#a8d4ee"/>
    <text x="1320" y="580" text-anchor="middle" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
      <tspan x="1320" dy="0">固定ページのデザインを</tspan>
      <tspan x="1320" dy="32">AIに依頼して詰める</tspan>
      <tspan x="1320" dy="32">問い合わせフォーム</tspan>
      <tspan x="1320" dy="32">（Contact Form 7）導入</tspan>
      <tspan x="1320" dy="48" font-weight="600" fill="#3a7ba8">主要コンテンツが揃う</tspan>
    </text>
    <circle cx="1320" cy="274" r="30" fill="#a8d4ee"/>
    <text x="1320" y="274" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="30">4</text>
  </g>

  <!-- カード5 : 12/18 達成（オレンジ強調） -->
  <g>
    <rect x="1520" y="280" width="320" height="640" rx="12" fill="#f59e0b" opacity="0.12" filter="url(#softShadow6)"/>
    <rect x="1520" y="274" width="320" height="640" rx="12" fill="#ffffff" stroke="#fde6c1" stroke-width="2"/>
    <rect x="1635" y="324" width="90" height="90" rx="14" fill="#fef3e2"/>
    <text x="1680" y="380" text-anchor="middle" font-size="44" fill="#f59e0b" font-weight="700" dominant-baseline="central">●</text>
    <text x="1680" y="442" text-anchor="middle" fill="#f59e0b" font-weight="700" font-size="22" letter-spacing="1.2" dominant-baseline="hanging">2025.12.18 / DONE</text>
    <text x="1680" y="490" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="30" dominant-baseline="hanging">準備完了</text>
    <rect x="1662" y="552" width="36" height="2" rx="1" fill="#f59e0b"/>
    <text x="1680" y="580" text-anchor="middle" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
      <tspan x="1680" dy="0">「テーマと主要コンテンツの</tspan>
      <tspan x="1680" dy="32">準備が終わりました」と</tspan>
      <tspan x="1680" dy="32">AIに報告できる状態に</tspan>
      <tspan x="1680" dy="48" font-weight="600" fill="#3a7ba8">隣の土地に、家ができた</tspan>
    </text>
    <circle cx="1680" cy="274" r="30" fill="#f59e0b"/>
    <text x="1680" y="274" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="30">5</text>
  </g>

  <!-- 矢印 1->2 (オレンジで「決断」を起点に) -->
  <g stroke="#f59e0b" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="404" y1="594" x2="436" y2="594"/>
    <polyline points="430,587 442,594 430,601"/>
  </g>
  <!-- 矢印 2->3 -->
  <g stroke="#a8d4ee" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="764" y1="594" x2="796" y2="594"/>
    <polyline points="790,587 802,594 790,601"/>
  </g>
  <!-- 矢印 3->4 -->
  <g stroke="#a8d4ee" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="1124" y1="594" x2="1156" y2="594"/>
    <polyline points="1150,587 1162,594 1150,601"/>
  </g>
  <!-- 矢印 4->5 (オレンジで達成を強調) -->
  <g stroke="#f59e0b" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="1484" y1="594" x2="1516" y2="594"/>
    <polyline points="1510,587 1522,594 1510,601"/>
  </g>

  <!-- フッター：次回予告 -->
  <g>
    <rect x="600" y="970" width="720" height="56" rx="28" fill="#ffffff" stroke="#d8e7f2" stroke-width="1.5"/>
    <circle cx="630" cy="998" r="5" fill="#5da8d4"/>
    <text x="652" y="998" dominant-baseline="central" fill="#3a7ba8" font-weight="600" font-size="22" letter-spacing="0.8">次回はここから「144件の引っ越し」というもう一つの修羅場へ</text>
  </g>
</svg>
