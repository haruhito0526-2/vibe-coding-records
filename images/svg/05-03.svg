<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow53" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">CHAPTER 03 — ALL-IN-ONE</text>
  <text x="80" y="112" font-weight="700" font-size="44" dominant-baseline="hanging">
    <tspan fill="#1f2937">体験・履歴・制作物が、</tspan><tspan fill="#3a7ba8">ぜんぶ同じ場所</tspan><tspan fill="#1f2937">に残る</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">VOL.5 — PIPELINE ①</text>
  <text x="1840" y="116" text-anchor="end" fill="#f59e0b" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">ALL-IN-ONE</text>

  <!-- 中央：Claudeチャット -->
  <g>
    <rect x="700" y="380" width="520" height="380" rx="20" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow53)"/>
    <rect x="700" y="374" width="520" height="380" rx="20" fill="#fff" stroke="#3a7ba8" stroke-width="3"/>

    <rect x="700" y="374" width="520" height="50" rx="20" fill="#3a7ba8"/>
    <rect x="700" y="395" width="520" height="29" fill="#3a7ba8"/>
    <text x="960" y="400" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="700" font-size="18" letter-spacing="2">CLAUDE CODE</text>

    <!-- チャットメッセージ風 -->
    <g>
      <rect x="730" y="450" width="360" height="50" rx="10" fill="#ecf2f7"/>
      <line x1="750" y1="467" x2="1060" y2="467" stroke="#3a7ba8" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="750" y1="483" x2="1010" y2="483" stroke="#3a7ba8" stroke-width="2.5" stroke-linecap="round"/>

      <rect x="830" y="520" width="360" height="50" rx="10" fill="#fef3e2"/>
      <line x1="850" y1="537" x2="1160" y2="537" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="850" y1="553" x2="1110" y2="553" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>

      <rect x="730" y="590" width="360" height="50" rx="10" fill="#ecf2f7"/>
      <line x1="750" y1="607" x2="1040" y2="607" stroke="#3a7ba8" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="750" y1="623" x2="1060" y2="623" stroke="#3a7ba8" stroke-width="2.5" stroke-linecap="round"/>

      <rect x="830" y="660" width="360" height="50" rx="10" fill="#fef3e2"/>
      <line x1="850" y1="677" x2="1160" y2="677" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="850" y1="693" x2="1110" y2="693" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- 左上：体験 -->
  <g transform="translate(180, 240)">
    <rect x="0" y="0" width="320" height="120" rx="12" fill="#fff" stroke="#fde6c1" stroke-width="2"/>
    <rect x="0" y="0" width="64" height="120" rx="12" fill="#fef3e2"/>
    <text x="32" y="60" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="32">A</text>
    <text x="84" y="36" fill="#1f2937" font-weight="700" font-size="22" dominant-baseline="hanging">体験</text>
    <text x="84" y="68" fill="#6b7280" font-weight="500" font-size="14" dominant-baseline="hanging">作業しながら何を見たか</text>
    <text x="84" y="90" fill="#6b7280" font-weight="500" font-size="14" dominant-baseline="hanging">何を試したか</text>
  </g>

  <!-- 左下：履歴 -->
  <g transform="translate(180, 780)">
    <rect x="0" y="0" width="320" height="120" rx="12" fill="#fff" stroke="#fde6c1" stroke-width="2"/>
    <rect x="0" y="0" width="64" height="120" rx="12" fill="#fef3e2"/>
    <text x="32" y="60" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="32">B</text>
    <text x="84" y="36" fill="#1f2937" font-weight="700" font-size="22" dominant-baseline="hanging">履歴</text>
    <text x="84" y="68" fill="#6b7280" font-weight="500" font-size="14" dominant-baseline="hanging">AIに何を頼んで</text>
    <text x="84" y="90" fill="#6b7280" font-weight="500" font-size="14" dominant-baseline="hanging">何が返ってきたか</text>
  </g>

  <!-- 右：制作物 -->
  <g transform="translate(1420, 510)">
    <rect x="0" y="0" width="320" height="120" rx="12" fill="#fff" stroke="#fde6c1" stroke-width="2"/>
    <rect x="0" y="0" width="64" height="120" rx="12" fill="#fef3e2"/>
    <text x="32" y="60" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="32">C</text>
    <text x="84" y="36" fill="#1f2937" font-weight="700" font-size="22" dominant-baseline="hanging">制作物</text>
    <text x="84" y="68" fill="#6b7280" font-weight="500" font-size="14" dominant-baseline="hanging">作ったコード・画像・</text>
    <text x="84" y="90" fill="#6b7280" font-weight="500" font-size="14" dominant-baseline="hanging">変換ファイル</text>
  </g>

  <!-- 矢印 -->
  <g stroke="#f59e0b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="510" y1="320" x2="700" y2="450"/>
    <polyline points="688,440 702,452 694,438"/>
    <line x1="510" y1="850" x2="700" y2="690"/>
    <polyline points="694,704 702,690 688,700"/>
    <line x1="1410" y1="570" x2="1230" y2="570"/>
    <polyline points="1242,562 1228,570 1242,578"/>
  </g>

  <!-- フッター -->
  <g>
    <rect x="380" y="940" width="1160" height="56" rx="28" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="414" cy="968" r="6" fill="#f59e0b"/>
    <text x="438" y="968" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="22" letter-spacing="0.8">バイブコーディングというテーマだから、ぜんぶClaudeの中に残る</text>
  </g>
</svg>
