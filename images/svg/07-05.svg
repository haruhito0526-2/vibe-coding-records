<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="100%" preserveAspectRatio="xMidYMid meet">
  <rect width="1280" height="670" fill="#f8f9fa"/>

  <text x="80" y="60" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">「読む」もAIに渡せる、という発想の広がり</text>
  <line x1="80" y1="105" x2="200" y2="105" stroke="#f59e0b" stroke-width="3"/>

  <!-- 中央ハブ -->
  <g transform="translate(560, 280)">
    <rect x="0" y="0" width="160" height="100" rx="20" fill="#fef3e2" stroke="#f59e0b" stroke-width="3"/>
    <line x1="80" y1="0" x2="80" y2="-12" stroke="#f59e0b" stroke-width="2.5"/>
    <circle cx="80" cy="-15" r="4" fill="#f59e0b"/>
    <text x="80" y="36" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="18">「読む」も</text>
    <text x="80" y="64" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="18">AIに渡す</text>
  </g>

  <!-- 上：Webアクセス（今回・オレンジ）2行構成 -->
  <g>
    <line x1="640" y1="280" x2="640" y2="220" stroke="#f59e0b" stroke-width="2.5"/>
    <g transform="translate(420, 130)">
      <rect x="0" y="0" width="440" height="90" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
      <g transform="translate(45, 45)">
        <line x1="-22" y1="14" x2="22" y2="14" stroke="#3a7ba8" stroke-width="1.5"/>
        <rect x="-18" y="0" width="6" height="14" fill="#a8d4ee"/>
        <rect x="-9" y="-6" width="6" height="20" fill="#a8d4ee"/>
        <rect x="0" y="-12" width="6" height="26" fill="#a8d4ee"/>
        <rect x="9" y="-18" width="6" height="32" fill="#f59e0b"/>
      </g>
      <text x="240" y="30" text-anchor="middle" dominant-baseline="hanging" fill="#1f2937" font-weight="700" font-size="20">Webアクセス</text>
      <text x="240" y="58" text-anchor="middle" dominant-baseline="hanging" fill="#f59e0b" font-weight="700" font-size="14">← 今回（GA4・Search Console）</text>
    </g>
  </g>

  <!-- 右：メルマガ開封率 -->
  <g>
    <line x1="720" y1="330" x2="820" y2="330" stroke="#3a7ba8" stroke-width="2" stroke-dasharray="6 4"/>
    <g transform="translate(840, 295)">
      <rect x="0" y="0" width="280" height="70" rx="14" fill="#fff" stroke="#3a7ba8" stroke-width="2"/>
      <g transform="translate(36, 35)">
        <rect x="-18" y="-12" width="36" height="24" rx="2" fill="#a8d4ee" stroke="#3a7ba8" stroke-width="2"/>
        <polyline points="-18,-12 0,4 18,-12" fill="none" stroke="#3a7ba8" stroke-width="2" stroke-linejoin="round"/>
      </g>
      <text x="80" y="20" dominant-baseline="hanging" fill="#1f2937" font-weight="700" font-size="17">メルマガ開封率</text>
      <text x="80" y="44" dominant-baseline="hanging" fill="#6b7280" font-size="12">件名の改善案を出せる</text>
    </g>
  </g>

  <!-- 左：売上データ -->
  <g>
    <line x1="560" y1="330" x2="460" y2="330" stroke="#3a7ba8" stroke-width="2" stroke-dasharray="6 4"/>
    <g transform="translate(160, 295)">
      <rect x="0" y="0" width="280" height="70" rx="14" fill="#fff" stroke="#3a7ba8" stroke-width="2"/>
      <g transform="translate(36, 35)">
        <circle cx="0" cy="0" r="16" fill="#a8d4ee" stroke="#3a7ba8" stroke-width="2"/>
        <path d="M 0,-16 A 16,16 0 0,1 14,8 L 0,0 Z" fill="#f59e0b" stroke="#3a7ba8" stroke-width="2" stroke-linejoin="round"/>
      </g>
      <text x="80" y="20" dominant-baseline="hanging" fill="#1f2937" font-weight="700" font-size="17">売上データ</text>
      <text x="80" y="44" dominant-baseline="hanging" fill="#6b7280" font-size="12">伸びている／落ちている商品</text>
    </g>
  </g>

  <!-- 下：フォーム送信ログ -->
  <g>
    <line x1="640" y1="380" x2="640" y2="430" stroke="#3a7ba8" stroke-width="2" stroke-dasharray="6 4"/>
    <g transform="translate(490, 440)">
      <rect x="0" y="0" width="300" height="70" rx="14" fill="#fff" stroke="#3a7ba8" stroke-width="2"/>
      <g transform="translate(36, 35)">
        <rect x="-14" y="-18" width="28" height="36" rx="2" fill="#fff" stroke="#3a7ba8" stroke-width="2"/>
        <line x1="-9" y1="-10" x2="9" y2="-10" stroke="#3a7ba8" stroke-width="1.5"/>
        <line x1="-9" y1="-3" x2="9" y2="-3" stroke="#3a7ba8" stroke-width="1.5"/>
        <line x1="-9" y1="4" x2="5" y2="4" stroke="#3a7ba8" stroke-width="1.5"/>
        <line x1="-9" y1="11" x2="9" y2="11" stroke="#f59e0b" stroke-width="1.5"/>
      </g>
      <text x="80" y="20" dominant-baseline="hanging" fill="#1f2937" font-weight="700" font-size="17">フォーム送信ログ</text>
      <text x="80" y="44" dominant-baseline="hanging" fill="#6b7280" font-size="12">途中離脱の割合が分かる</text>
    </g>
  </g>

  <!-- フッターキャッチ -->
  <g>
    <rect x="240" y="568" width="800" height="52" rx="26" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="272" cy="594" r="6" fill="#f59e0b"/>
    <text x="294" y="594" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="20" letter-spacing="0.5">数字が溜まる場所は、ぜんぶAIに渡せる</text>
  </g>
</svg>
