<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow54" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">CHAPTER 04 — TEST FLIGHT</text>
  <text x="80" y="112" font-weight="700" font-size="44" dominant-baseline="hanging">
    <tspan fill="#1f2937">1〜4話を経て、</tspan><tspan fill="#f59e0b">道具と運用</tspan><tspan fill="#1f2937">が両方そろってきた</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">VOL.5 — PIPELINE ①</text>
  <text x="1840" y="116" text-anchor="end" fill="#f59e0b" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">READY</text>

  <!-- 左：1〜4話のミニアイコン -->
  <g>
    <rect x="120" y="240" width="420" height="660" rx="14" fill="#3a7ba8" opacity="0.08" filter="url(#softShadow54)"/>
    <rect x="120" y="234" width="420" height="660" rx="14" fill="#fff" stroke="#ecf2f7" stroke-width="1.5"/>
    <rect x="150" y="270" width="220" height="36" rx="18" fill="#ecf2f7"/>
    <text x="260" y="288" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="18" letter-spacing="1.5">TEST FLIGHT</text>

    <!-- #01 -->
    <g transform="translate(150, 340)">
      <rect x="0" y="0" width="360" height="100" rx="10" fill="#fff" stroke="#a8d4ee" stroke-width="2"/>
      <rect x="0" y="0" width="80" height="100" rx="10" fill="#eaf4fb"/>
      <text x="40" y="50" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="20">#01</text>
      <text x="100" y="36" fill="#1f2937" font-weight="700" font-size="18" dominant-baseline="hanging">連載導入</text>
      <text x="100" y="62" fill="#6b7280" font-weight="500" font-size="13" dominant-baseline="hanging">半年間のアップデート</text>
    </g>
    <!-- #02 -->
    <g transform="translate(150, 460)">
      <rect x="0" y="0" width="360" height="100" rx="10" fill="#fff" stroke="#a8d4ee" stroke-width="2"/>
      <rect x="0" y="0" width="80" height="100" rx="10" fill="#eaf4fb"/>
      <text x="40" y="50" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="20">#02</text>
      <text x="100" y="30" fill="#1f2937" font-weight="700" font-size="18" dominant-baseline="hanging">テーマ書き直し</text>
      <text x="100" y="56" fill="#6b7280" font-weight="500" font-size="13" dominant-baseline="hanging">画像と図解の作り方</text>
      <text x="100" y="76" fill="#6b7280" font-weight="500" font-size="13" dominant-baseline="hanging">配信の方針が固まった</text>
    </g>
    <!-- #03 -->
    <g transform="translate(150, 580)">
      <rect x="0" y="0" width="360" height="100" rx="10" fill="#fff" stroke="#a8d4ee" stroke-width="2"/>
      <rect x="0" y="0" width="80" height="100" rx="10" fill="#eaf4fb"/>
      <text x="40" y="50" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="20">#03</text>
      <text x="100" y="30" fill="#1f2937" font-weight="700" font-size="18" dominant-baseline="hanging">144件の引っ越し</text>
      <text x="100" y="56" fill="#6b7280" font-weight="500" font-size="13" dominant-baseline="hanging">ツールを作らせる</text>
      <text x="100" y="76" fill="#6b7280" font-weight="500" font-size="13" dominant-baseline="hanging">ディレクションの型</text>
    </g>
    <!-- #04 -->
    <g transform="translate(150, 700)">
      <rect x="0" y="0" width="360" height="100" rx="10" fill="#fff" stroke="#a8d4ee" stroke-width="2"/>
      <rect x="0" y="0" width="80" height="100" rx="10" fill="#eaf4fb"/>
      <text x="40" y="50" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="20">#04</text>
      <text x="100" y="30" fill="#1f2937" font-weight="700" font-size="18" dominant-baseline="hanging">フォーム自動化</text>
      <text x="100" y="56" fill="#6b7280" font-weight="500" font-size="13" dominant-baseline="hanging">複数ツールの使い分け</text>
      <text x="100" y="76" fill="#6b7280" font-weight="500" font-size="13" dominant-baseline="hanging">ワークフロー設計の型</text>
    </g>
    <text x="330" y="830" text-anchor="middle" fill="#6b7280" font-weight="500" font-size="14" dominant-baseline="hanging">↓ 各話の作業ログがClaude Codeに残る</text>
  </g>

  <!-- 矢印 -->
  <g stroke="#f59e0b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="560" y1="540" x2="710" y2="540"/>
    <polyline points="700,531 712,540 700,549"/>
  </g>

  <!-- 右：結実（道具と運用） -->
  <g>
    <!-- 道具 -->
    <rect x="730" y="240" width="540" height="320" rx="14" fill="#f59e0b" opacity="0.10" filter="url(#softShadow54)"/>
    <rect x="730" y="234" width="540" height="320" rx="14" fill="#fff" stroke="#fde6c1" stroke-width="2"/>
    <rect x="760" y="270" width="160" height="36" rx="18" fill="#fef3e2"/>
    <text x="840" y="288" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="18" letter-spacing="1.5">道具</text>
    <text x="760" y="334" fill="#1f2937" font-weight="700" font-size="26" dominant-baseline="hanging">作る側がそろった</text>

    <g transform="translate(760, 400)">
      <g><circle cx="6" cy="12" r="6" fill="#f59e0b"/><text x="22" y="12" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="18">画像生成</text></g>
      <g transform="translate(240, 0)"><circle cx="6" cy="12" r="6" fill="#f59e0b"/><text x="22" y="12" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="18">図解生成</text></g>
      <g transform="translate(0, 50)"><circle cx="6" cy="12" r="6" fill="#f59e0b"/><text x="22" y="12" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="18">XML変換</text></g>
      <g transform="translate(240, 50)"><circle cx="6" cy="12" r="6" fill="#f59e0b"/><text x="22" y="12" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="18">画像配信</text></g>
    </g>

    <!-- 運用 -->
    <rect x="730" y="600" width="540" height="300" rx="14" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow54)"/>
    <rect x="730" y="594" width="540" height="300" rx="14" fill="#fff" stroke="#a8d4ee" stroke-width="2"/>
    <rect x="760" y="630" width="160" height="36" rx="18" fill="#eaf4fb"/>
    <text x="840" y="648" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="18" letter-spacing="1.5">運用</text>
    <text x="760" y="694" fill="#1f2937" font-weight="700" font-size="26" dominant-baseline="hanging">記録の側が動き出した</text>

    <g transform="translate(760, 760)">
      <g><circle cx="6" cy="12" r="6" fill="#3a7ba8"/><text x="22" y="12" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="18">作業ログがClaudeに集約される</text></g>
      <g transform="translate(0, 50)"><circle cx="6" cy="12" r="6" fill="#3a7ba8"/><text x="22" y="12" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="18">別途メモを取る必要がない</text></g>
    </g>
  </g>

  <!-- 矢印（→ READY） -->
  <g stroke="#f59e0b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="1290" y1="540" x2="1430" y2="540"/>
    <polyline points="1418,531 1432,540 1418,549"/>
  </g>

  <!-- 右端：READY -->
  <g transform="translate(1450, 380)">
    <rect x="0" y="0" width="350" height="320" rx="14" fill="#f59e0b"/>
    <text x="175" y="100" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="700" font-size="42" letter-spacing="3">READY</text>
    <line x1="60" y1="160" x2="290" y2="160" stroke="#fff" stroke-width="2" opacity="0.7"/>
    <text x="175" y="200" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="600" font-size="18">最初に狙っていた仕組みが</text>
    <text x="175" y="232" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="600" font-size="18">ようやく動き始めた</text>
    <text x="175" y="280" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="700" font-size="22" opacity="0.9">— at VOL.5 —</text>
  </g>

  <!-- フッター -->
  <g>
    <rect x="380" y="940" width="1160" height="56" rx="28" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="414" cy="968" r="6" fill="#f59e0b"/>
    <text x="438" y="968" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="22" letter-spacing="0.8">切り替えたのではなく、最初から狙っていた形にようやく追いついた</text>
  </g>
</svg>
