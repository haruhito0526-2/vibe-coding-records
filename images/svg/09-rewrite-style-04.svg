<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="100%" preserveAspectRatio="xMidYMid meet">
  <rect width="1280" height="670" fill="#f8f9fa"/>

  <text x="80" y="60" fill="#1f2937" font-weight="700" font-size="34" dominant-baseline="hanging">「手を動かす」だけが、移った</text>
  <line x1="80" y1="115" x2="220" y2="115" stroke="#f59e0b" stroke-width="3"/>

  <!-- 上段：分担図 -->
  <g transform="translate(0, 170)">
    <!-- 左：自分の手元 -->
    <g transform="translate(80, 0)">
      <rect x="0" y="0" width="500" height="220" rx="14" fill="#fff" stroke="#3a7ba8" stroke-width="2.5"/>
      <text x="30" y="36" fill="#3a7ba8" font-weight="700" font-size="20">自分の手元に残った</text>
      <text x="30" y="58" fill="#6b7280" font-size="14">考える・判定する</text>

      <g transform="translate(30, 90)">
        <circle cx="10" cy="10" r="10" fill="#3a7ba8"/>
        <text x="10" y="10" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="11" font-weight="700">1</text>
        <text x="32" y="15" fill="#1f2937" font-weight="600" font-size="17">採用するかしないかの判定</text>
      </g>
      <g transform="translate(30, 130)">
        <circle cx="10" cy="10" r="10" fill="#3a7ba8"/>
        <text x="10" y="10" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="11" font-weight="700">2</text>
        <text x="32" y="15" fill="#1f2937" font-weight="600" font-size="17">配色・フォントの揺れに気づく</text>
      </g>
      <g transform="translate(30, 170)">
        <circle cx="10" cy="10" r="10" fill="#3a7ba8"/>
        <text x="10" y="10" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="11" font-weight="700">3</text>
        <text x="32" y="15" fill="#1f2937" font-weight="600" font-size="17">「ここに図表が必要」の判断</text>
      </g>
    </g>

    <!-- 矢印 -->
    <g transform="translate(610, 110)">
      <line x1="0" y1="0" x2="80" y2="0" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round"/>
      <polygon points="80,0 70,-7 70,7" fill="#f59e0b"/>
    </g>

    <!-- 右：Claude Code側 -->
    <g transform="translate(720, 0)">
      <rect x="0" y="0" width="480" height="220" rx="14" fill="#fef3e2" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="30" y="36" fill="#f59e0b" font-weight="700" font-size="20">Claude Code側に移った</text>
      <text x="30" y="58" fill="#6b7280" font-size="14">手を動かす</text>

      <g transform="translate(30, 90)">
        <circle cx="10" cy="10" r="10" fill="#f59e0b"/>
        <text x="32" y="15" fill="#1f2937" font-weight="600" font-size="17">SVGコードを書く</text>
      </g>
      <g transform="translate(30, 130)">
        <circle cx="10" cy="10" r="10" fill="#f59e0b"/>
        <text x="32" y="15" fill="#1f2937" font-weight="600" font-size="17">PNGに変換する</text>
      </g>
      <g transform="translate(30, 170)">
        <circle cx="10" cy="10" r="10" fill="#f59e0b"/>
        <text x="32" y="15" fill="#1f2937" font-weight="600" font-size="17">出力先に保存する</text>
      </g>
    </g>
  </g>

  <!-- 下段：スマホ確認フロー（中央寄せ、実線） -->
  <g transform="translate(640, 490)">
    <text x="0" y="-60" text-anchor="middle" fill="#6b7280" font-size="15" font-weight="600">まだ雑：スマホ確認のためのアプリ間の行き来</text>

    <!-- PC -->
    <g transform="translate(-360, 0)">
      <rect x="-50" y="-30" width="100" height="60" rx="6" fill="#fff" stroke="#3a7ba8" stroke-width="2.5"/>
      <rect x="-40" y="-22" width="80" height="44" fill="#a8d4ee"/>
      <text x="0" y="50" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="14">PC</text>
    </g>
    <!-- 矢印 -->
    <g transform="translate(-260, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#9ca3af" stroke-width="2.5"/>
      <polygon points="50,0 42,-5 42,5" fill="#9ca3af"/>
    </g>
    <!-- Googleドライブ -->
    <g transform="translate(-130, 0)">
      <rect x="-70" y="-30" width="140" height="60" rx="8" fill="#fff" stroke="#9ca3af" stroke-width="2.5"/>
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="15">Googleドライブ</text>
      <text x="0" y="50" text-anchor="middle" fill="#6b7280" font-size="13">同期待ち</text>
    </g>
    <!-- 矢印 -->
    <g transform="translate(-30, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#9ca3af" stroke-width="2.5"/>
      <polygon points="50,0 42,-5 42,5" fill="#9ca3af"/>
    </g>
    <!-- スマホ -->
    <g transform="translate(80, 0)">
      <rect x="-22" y="-36" width="44" height="72" rx="6" fill="#fff" stroke="#3a7ba8" stroke-width="2.5"/>
      <rect x="-17" y="-30" width="34" height="56" fill="#a8d4ee"/>
      <circle cx="0" cy="32" r="2.5" fill="#3a7ba8"/>
      <text x="0" y="56" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="14">スマホ</text>
    </g>
    <!-- 戻り矢印（実線） -->
    <g transform="translate(170, 0)">
      <line x1="0" y1="0" x2="80" y2="0" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
      <polygon points="80,0 70,-7 70,7" fill="#f59e0b"/>
      <text x="40" y="-12" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700">NGなら戻す</text>
    </g>
    <!-- 修正→再生成 -->
    <g transform="translate(330, 0)">
      <rect x="-70" y="-30" width="140" height="60" rx="8" fill="#fef3e2" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="15">修正→再生成</text>
    </g>
  </g>

  <!-- フッターキャッチ -->
  <g>
    <rect x="200" y="615" width="880" height="42" rx="21" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="232" cy="636" r="6" fill="#f59e0b"/>
    <text x="254" y="636" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="18" letter-spacing="0.5">アプリ間の行き来は、いずれ滑らかにしたいポイント</text>
  </g>
</svg>
