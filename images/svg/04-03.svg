<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow43" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">DIRECTION FLOW</text>
  <text x="80" y="112" font-weight="700" font-size="44" dominant-baseline="hanging">
    <tspan fill="#1f2937">要件を箇条書きで投げる → </tspan><tspan fill="#3a7ba8">候補と難度</tspan><tspan fill="#1f2937">が返る → </tspan><tspan fill="#f59e0b">選ぶ</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">CH.2 — DIRECTION</text>
  <text x="1840" y="116" text-anchor="end" fill="#3a7ba8" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">SAME AS BRIEF</text>

  <!-- ステップ1: 要件を箇条書き -->
  <g transform="translate(80, 240)">
    <rect x="0" y="0" width="540" height="640" rx="14" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow43)"/>
    <rect x="0" y="-6" width="540" height="640" rx="14" fill="#ffffff" stroke="#ecf2f7" stroke-width="1.5"/>

    <rect x="30" y="30" width="160" height="36" rx="18" fill="#ecf2f7"/>
    <text x="110" y="48" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="18" letter-spacing="1.4">STEP 1</text>

    <text x="30" y="100" fill="#1f2937" font-weight="700" font-size="32" dominant-baseline="hanging">要件を箇条書きで書く</text>
    <text x="30" y="148" fill="#6b7280" font-weight="500" font-size="18" dominant-baseline="hanging">こちらの「こうしたい」をぜんぶ書き出す</text>

    <!-- 要件リスト -->
    <g transform="translate(30, 200)">
      <g><circle cx="6" cy="12" r="5" fill="#5da8d4"/><text x="22" y="12" dominant-baseline="central" fill="#1f2937" font-weight="500" font-size="17">指定アドレスに受付メール</text></g>
      <g transform="translate(0, 50)"><circle cx="6" cy="12" r="5" fill="#5da8d4"/><text x="22" y="12" dominant-baseline="central" fill="#1f2937" font-weight="500" font-size="17">送信者に自動返信メール</text></g>
      <g transform="translate(0, 100)"><circle cx="6" cy="12" r="5" fill="#5da8d4"/><text x="22" y="12" dominant-baseline="central" fill="#1f2937" font-weight="500" font-size="17">サンクスページに移動</text></g>
      <g transform="translate(0, 150)"><circle cx="6" cy="12" r="5" fill="#5da8d4"/><text x="22" y="12" dominant-baseline="central" fill="#1f2937" font-weight="500" font-size="17">CV計測を引き継げること</text></g>
      <g transform="translate(0, 200)"><circle cx="6" cy="12" r="5" fill="#f59e0b"/><text x="22" y="12" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="17">メルマガ登録も同じフォームから</text></g>
      <g transform="translate(0, 250)"><circle cx="6" cy="12" r="5" fill="#5da8d4"/><text x="22" y="12" dominant-baseline="central" fill="#6b7280" font-weight="500" font-size="17">スパム対策(任意)</text></g>
    </g>

    <!-- 吹き出し -->
    <g transform="translate(30, 510)">
      <rect x="0" y="0" width="480" height="80" rx="10" fill="#ecf2f7"/>
      <text x="20" y="22" fill="#3a7ba8" font-weight="700" font-size="14" letter-spacing="1.2" dominant-baseline="hanging">PROMPT</text>
      <text x="20" y="46" fill="#1f2937" font-weight="600" font-size="18" dominant-baseline="hanging">「この要件を満たせるソリューションを、</text>
      <text x="20" y="68" fill="#1f2937" font-weight="600" font-size="18" dominant-baseline="hanging">いくつか教えてください」</text>
    </g>
  </g>

  <!-- 矢印1→2 -->
  <g stroke="#5da8d4" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="640" y1="560" x2="700" y2="560"/>
    <polyline points="690,553 702,560 690,567"/>
  </g>

  <!-- ステップ2: AIから候補2つ -->
  <g transform="translate(720, 240)">
    <rect x="0" y="0" width="540" height="640" rx="14" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow43)"/>
    <rect x="0" y="-6" width="540" height="640" rx="14" fill="#ffffff" stroke="#ecf2f7" stroke-width="1.5"/>

    <rect x="30" y="30" width="160" height="36" rx="18" fill="#ecf2f7"/>
    <text x="110" y="48" text-anchor="middle" dominant-baseline="central" fill="#3a7ba8" font-weight="700" font-size="18" letter-spacing="1.4">STEP 2</text>

    <text x="30" y="100" fill="#1f2937" font-weight="700" font-size="32" dominant-baseline="hanging">AIから候補が返る</text>
    <text x="30" y="148" fill="#6b7280" font-weight="500" font-size="18" dominant-baseline="hanging">2択と、それぞれの実装難度を提示</text>

    <!-- 候補A -->
    <g transform="translate(30, 200)">
      <rect x="0" y="0" width="480" height="120" rx="10" fill="#ecf2f7" stroke="#a8d4ee" stroke-width="1.5"/>
      <text x="20" y="20" fill="#3a7ba8" font-weight="700" font-size="14" letter-spacing="1.2" dominant-baseline="hanging">CANDIDATE A</text>
      <text x="20" y="50" fill="#1f2937" font-weight="700" font-size="22" dominant-baseline="hanging">Contact Form 7（CF7）</text>
      <text x="20" y="82" fill="#6b7280" font-weight="500" font-size="15" dominant-baseline="hanging">世界で最も使われているプラグイン。</text>
      <text x="20" y="100" fill="#6b7280" font-weight="500" font-size="15" dominant-baseline="hanging">情報量が圧倒的に多い。</text>
    </g>

    <!-- 候補B -->
    <g transform="translate(30, 340)">
      <rect x="0" y="0" width="480" height="120" rx="10" fill="#ecf2f7" stroke="#a8d4ee" stroke-width="1.5"/>
      <text x="20" y="20" fill="#3a7ba8" font-weight="700" font-size="14" letter-spacing="1.2" dominant-baseline="hanging">CANDIDATE B</text>
      <text x="20" y="50" fill="#1f2937" font-weight="700" font-size="22" dominant-baseline="hanging">Snow Monkey Forms</text>
      <text x="20" y="82" fill="#6b7280" font-weight="500" font-size="15" dominant-baseline="hanging">日本製で新しめ。設定画面が綺麗で</text>
      <text x="20" y="100" fill="#6b7280" font-weight="500" font-size="15" dominant-baseline="hanging">サンクスページ等が標準で揃う。</text>
    </g>

    <!-- メルマガ連携の注 -->
    <g transform="translate(30, 490)">
      <rect x="0" y="0" width="480" height="100" rx="10" fill="#fef3e2" stroke="#fde6c1" stroke-width="1.5"/>
      <text x="20" y="20" fill="#f59e0b" font-weight="700" font-size="14" letter-spacing="1.2" dominant-baseline="hanging">NOTE</text>
      <text x="20" y="48" fill="#1f2937" font-weight="700" font-size="17" dominant-baseline="hanging">メルマガ連携は、</text>
      <text x="20" y="70" fill="#1f2937" font-weight="700" font-size="17" dominant-baseline="hanging">どちらを選んでも別途カスタマイズが必要</text>
    </g>
  </g>

  <!-- 矢印2→3 -->
  <g stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="1280" y1="560" x2="1340" y2="560"/>
    <polyline points="1330,553 1342,560 1330,567"/>
  </g>

  <!-- ステップ3: 選ぶ -->
  <g transform="translate(1360, 240)">
    <rect x="0" y="0" width="480" height="640" rx="14" fill="#f59e0b" opacity="0.12" filter="url(#softShadow43)"/>
    <rect x="0" y="-6" width="480" height="640" rx="14" fill="#ffffff" stroke="#fde6c1" stroke-width="2"/>

    <rect x="30" y="30" width="160" height="36" rx="18" fill="#fef3e2"/>
    <text x="110" y="48" text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-weight="700" font-size="18" letter-spacing="1.4">STEP 3</text>

    <text x="30" y="100" fill="#1f2937" font-weight="700" font-size="32" dominant-baseline="hanging">選ぶ</text>
    <text x="30" y="148" fill="#6b7280" font-weight="500" font-size="18" dominant-baseline="hanging">こちらの判断軸で1つに決める</text>

    <!-- 選択結果 -->
    <g transform="translate(30, 220)">
      <rect x="0" y="0" width="420" height="200" rx="10" fill="#fef3e2" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="20" y="22" fill="#f59e0b" font-weight="700" font-size="14" letter-spacing="1.2" dominant-baseline="hanging">SELECTED</text>
      <text x="20" y="56" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">Contact Form 7</text>
      <text x="20" y="100" fill="#6b7280" font-weight="500" font-size="16" dominant-baseline="hanging">判断軸：</text>
      <text x="20" y="128" fill="#1f2937" font-weight="700" font-size="18" dominant-baseline="hanging">Webの情報量＝AIの解決力</text>
      <text x="20" y="158" fill="#6b7280" font-weight="500" font-size="15" dominant-baseline="hanging">情報量が多いほうが、トラブル時に</text>
      <text x="20" y="178" fill="#6b7280" font-weight="500" font-size="15" dominant-baseline="hanging">AIが過去事例から解決してくれる</text>
    </g>

    <!-- 採用の決め手 -->
    <g transform="translate(30, 460)">
      <rect x="0" y="0" width="420" height="100" rx="10" fill="#ecf2f7"/>
      <text x="20" y="20" fill="#3a7ba8" font-weight="700" font-size="14" letter-spacing="1.2" dominant-baseline="hanging">CHECK</text>
      <text x="20" y="48" fill="#1f2937" font-weight="700" font-size="17" dominant-baseline="hanging">「AIが作れます」と判断したか</text>
      <text x="20" y="74" fill="#6b7280" font-weight="500" font-size="15" dominant-baseline="hanging">作れると分かれば、あとは任せるだけ</text>
    </g>
  </g>

  <!-- フッター -->
  <g>
    <rect x="280" y="940" width="1360" height="56" rx="28" fill="#ffffff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="314" cy="968" r="6" fill="#f59e0b"/>
    <text x="338" y="968" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="22" letter-spacing="0.8">映像制作で発注書を書くときの感覚に、限りなく近かった</text>
  </g>
</svg>
