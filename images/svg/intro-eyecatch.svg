<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="100%" preserveAspectRatio="xMidYMid meet">
  <rect width="1280" height="670" fill="#f8f9fa"/>

  <!-- 上部：シリーズ冠＋話数 -->
  <text x="80" y="60" fill="#5da8d4" font-weight="600" font-size="18" letter-spacing="3" dominant-baseline="hanging">中小企業のひとりDX担当が、AIで会社をアップデートする</text>
  <line x1="80" y1="98" x2="200" y2="98" stroke="#5da8d4" stroke-width="3"/>
  <text x="1200" y="60" text-anchor="end" fill="#f59e0b" font-weight="700" font-size="22" letter-spacing="2" dominant-baseline="hanging">#01 — INTRO</text>

  <!-- メインタイトル -->
  <text x="80" y="170" font-weight="700" font-size="58" dominant-baseline="hanging">
    <tspan fill="#1f2937">非エンジニアが、</tspan>
  </text>
  <text x="80" y="248" font-weight="700" font-size="58" dominant-baseline="hanging">
    <tspan fill="#1f2937">AIで会社を</tspan>
  </text>
  <text x="80" y="326" font-weight="700" font-size="58" dominant-baseline="hanging">
    <tspan fill="#3a7ba8">半年で</tspan><tspan fill="#f59e0b">アップデート</tspan>
  </text>
  <text x="80" y="404" font-weight="700" font-size="58" dominant-baseline="hanging">
    <tspan fill="#1f2937">してきた話</tspan>
  </text>

  <!-- 右：ハブ＆スポーク -->
  <g transform="translate(880, 170)">
    <!-- 接続線 -->
    <g stroke="#5da8d4" stroke-width="2" opacity="0.45">
      <line x1="60" y1="60" x2="155" y2="155"/>
      <line x1="300" y1="60" x2="200" y2="155"/>
      <line x1="20" y1="200" x2="125" y2="180"/>
      <line x1="340" y1="200" x2="235" y2="180"/>
      <line x1="80" y1="320" x2="160" y2="220"/>
      <line x1="280" y1="320" x2="200" y2="220"/>
    </g>
    <!-- 周囲ノード -->
    <g>
      <circle cx="60" cy="60" r="24" fill="#fff" stroke="#5da8d4" stroke-width="3"/>
      <circle cx="300" cy="60" r="24" fill="#fff" stroke="#5da8d4" stroke-width="3"/>
      <circle cx="20" cy="200" r="24" fill="#fff" stroke="#5da8d4" stroke-width="3"/>
      <circle cx="340" cy="200" r="24" fill="#fff" stroke="#5da8d4" stroke-width="3"/>
      <circle cx="80" cy="320" r="24" fill="#fff" stroke="#5da8d4" stroke-width="3"/>
      <circle cx="280" cy="320" r="24" fill="#fff" stroke="#5da8d4" stroke-width="3"/>
    </g>
    <!-- 中央ハブ -->
    <circle cx="180" cy="190" r="60" fill="#f59e0b"/>
    <text x="180" y="196" text-anchor="middle" dominant-baseline="central" fill="#fff" font-weight="700" font-size="32" letter-spacing="3">DX</text>
  </g>

  <!-- フッターキャッチ -->
  <g>
    <rect x="280" y="568" width="720" height="52" rx="26" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="312" cy="594" r="6" fill="#f59e0b"/>
    <text x="334" y="594" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="20" letter-spacing="0.5">コードは読めない。でも、AIになら頼める</text>
  </g>
</svg>
