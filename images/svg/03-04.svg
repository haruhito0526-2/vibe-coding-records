<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow34" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">INVISIBLE CRACK</text>
  <text x="80" y="112" font-weight="700" font-size="44" dominant-baseline="hanging">
    <tspan fill="#1f2937">「ローカルで見えてる」が、本番では</tspan><tspan fill="#f59e0b">壊れていた</tspan><tspan fill="#1f2937">理由</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">IMAGE URL ISSUE</text>
  <text x="1840" y="116" text-anchor="end" fill="#3a7ba8" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">3〜4 / 10</text>

  <!-- カード1：ローカル作業中 -->
  <g>
    <rect x="80" y="240" width="560" height="700" rx="14" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow34)"/>
    <rect x="80" y="234" width="560" height="700" rx="14" fill="#ffffff" stroke="#ecf2f7" stroke-width="1.5"/>
    <circle cx="160" cy="270" r="26" fill="#a8d4ee"/>
    <text x="160" y="270" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="26">1</text>
    <text x="200" y="262" fill="#5da8d4" font-weight="600" font-size="18" letter-spacing="1.4" dominant-baseline="hanging">LOCAL</text>
    <text x="200" y="286" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">ローカルで作業中</text>

    <!-- 自分のPC -->
    <g transform="translate(110, 360)">
      <rect x="0" y="0" width="200" height="140" rx="10" fill="#eaf4fb" stroke="#a8d4ee" stroke-width="2"/>
      <text x="100" y="20" text-anchor="middle" fill="#3a7ba8" font-weight="600" font-size="16" letter-spacing="1" dominant-baseline="hanging">YOUR PC</text>
      <rect x="20" y="50" width="160" height="70" rx="6" fill="#ffffff" stroke="#a8d4ee" stroke-width="1.5"/>
      <text x="100" y="78" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="16">ローカル新サイト</text>
      <text x="100" y="100" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-weight="500" font-size="13">HTML: src=旧本番URL</text>
    </g>

    <!-- 矢印（外に画像を取りに行く） -->
    <g stroke="#3a7ba8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 320 430 Q 380 380 440 430" />
      <polyline points="430,422 442,432 432,444"/>
    </g>
    <text x="380" y="362" text-anchor="middle" fill="#3a7ba8" font-weight="600" font-size="15" dominant-baseline="hanging">画像取得</text>
    <text x="380" y="382" text-anchor="middle" fill="#3a7ba8" font-weight="600" font-size="15" dominant-baseline="hanging">(ネット越し)</text>

    <!-- 旧本番サーバー -->
    <g transform="translate(440, 360)">
      <rect x="0" y="0" width="170" height="140" rx="10" fill="#fff7e6" stroke="#fcd590" stroke-width="2"/>
      <text x="85" y="20" text-anchor="middle" fill="#9a6a18" font-weight="600" font-size="16" letter-spacing="1" dominant-baseline="hanging">OLD PROD</text>
      <rect x="20" y="50" width="130" height="70" rx="6" fill="#ffffff" stroke="#fcd590" stroke-width="1.5"/>
      <text x="85" y="78" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="16">旧本番サーバー</text>
      <text x="85" y="100" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-weight="500" font-size="13">画像ファイル</text>
    </g>

    <!-- 結果バー -->
    <rect x="110" y="600" width="500" height="100" rx="10" fill="#e7f5ec"/>
    <text x="135" y="620" fill="#2f8a4e" font-weight="700" font-size="40" dominant-baseline="hanging">✓</text>
    <text x="180" y="624" fill="#1f2937" font-weight="700" font-size="22" dominant-baseline="hanging">ローカル画面では画像が表示されている</text>
    <text x="180" y="660" fill="#4b5563" font-weight="500" font-size="17" dominant-baseline="hanging">何の異常も起きないので、人間も気づかない</text>

    <!-- 注釈 -->
    <text x="110" y="740" fill="#6b7280" font-weight="500" font-size="16" dominant-baseline="hanging">変換ツールはHTMLの構造は新しくしてくれるが、</text>
    <text x="110" y="766" fill="#6b7280" font-weight="500" font-size="16" dominant-baseline="hanging">&lt;img src="..."&gt;の中身（画像URL）には</text>
    <text x="110" y="792" fill="#6b7280" font-weight="500" font-size="16" dominant-baseline="hanging">触らないので、旧サイトのまま残っている</text>
  </g>

  <!-- 矢印カード1→2 -->
  <g stroke="#a8d4ee" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="660" y1="584" x2="700" y2="584"/>
    <polyline points="690,576 702,584 690,592"/>
  </g>

  <!-- カード2：本番乗せ替え -->
  <g>
    <rect x="720" y="240" width="480" height="700" rx="14" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow34)"/>
    <rect x="720" y="234" width="480" height="700" rx="14" fill="#ffffff" stroke="#ecf2f7" stroke-width="1.5"/>
    <circle cx="800" cy="270" r="26" fill="#a8d4ee"/>
    <text x="800" y="270" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="26">2</text>
    <text x="840" y="262" fill="#5da8d4" font-weight="600" font-size="18" letter-spacing="1.4" dominant-baseline="hanging">DEPLOY</text>
    <text x="840" y="286" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">本番に乗せ替えた瞬間</text>

    <!-- ドメイン切り替え -->
    <g transform="translate(750, 360)">
      <rect x="0" y="0" width="420" height="80" rx="10" fill="#eaf4fb" stroke="#a8d4ee" stroke-width="2"/>
      <text x="210" y="22" text-anchor="middle" fill="#3a7ba8" font-weight="600" font-size="16" letter-spacing="1" dominant-baseline="hanging">DOMAIN SWITCH</text>
      <text x="40" y="52" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">本番ドメイン</text>
      <line x1="210" y1="60" x2="270" y2="60" stroke="#3a7ba8" stroke-width="2.5" stroke-linecap="round"/>
      <polyline points="260,53 272,60 260,67" fill="none" stroke="#3a7ba8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="380" y="52" text-anchor="end" fill="#1f2937" font-weight="700" font-size="20" dominant-baseline="hanging">新サイト</text>
    </g>

    <!-- 旧本番がアクセス不可に -->
    <g transform="translate(750, 480)">
      <rect x="0" y="0" width="420" height="170" rx="10" fill="#fef2f2" stroke="#f5c6c6" stroke-width="2"/>
      <text x="210" y="22" text-anchor="middle" fill="#b8413c" font-weight="600" font-size="16" letter-spacing="1" dominant-baseline="hanging">OLD PROD = OFFLINE</text>

      <rect x="40" y="60" width="130" height="80" rx="6" fill="#ffffff" stroke="#f5c6c6" stroke-width="1.5"/>
      <text x="105" y="92" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="16">旧本番サーバー</text>
      <text x="105" y="116" text-anchor="middle" dominant-baseline="central" fill="#b8413c" font-weight="700" font-size="22">アクセス不可</text>

      <text x="220" y="80" fill="#1f2937" font-weight="500" font-size="16" dominant-baseline="hanging">ドメインが切り替わると、</text>
      <text x="220" y="106" fill="#1f2937" font-weight="500" font-size="16" dominant-baseline="hanging">旧本番のファイルには</text>
      <text x="220" y="132" fill="#b8413c" font-weight="700" font-size="16" dominant-baseline="hanging">もう辿り着けない</text>
    </g>

    <!-- 注釈 -->
    <text x="750" y="700" fill="#6b7280" font-weight="500" font-size="16" dominant-baseline="hanging">新サイトのHTMLには</text>
    <text x="750" y="726" fill="#6b7280" font-weight="500" font-size="16" dominant-baseline="hanging">「画像URL：旧本番」と書かれたまま</text>
  </g>

  <!-- 矢印カード2→3 -->
  <g stroke="#f59e0b" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="1220" y1="584" x2="1260" y2="584"/>
    <polyline points="1250,576 1262,584 1250,592"/>
  </g>

  <!-- カード3：本番後 -->
  <g>
    <rect x="1280" y="240" width="560" height="700" rx="14" fill="#f59e0b" opacity="0.12" filter="url(#softShadow34)"/>
    <rect x="1280" y="234" width="560" height="700" rx="14" fill="#ffffff" stroke="#fde6c1" stroke-width="2"/>
    <circle cx="1360" cy="270" r="26" fill="#f59e0b"/>
    <text x="1360" y="270" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="26">3</text>
    <text x="1400" y="262" fill="#f59e0b" font-weight="600" font-size="18" letter-spacing="1.4" dominant-baseline="hanging">RESULT</text>
    <text x="1400" y="286" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">3〜4割が、リンク切れ</text>

    <!-- 画像グリッド：12個のうち4個が×、8個が○ -->
    <g transform="translate(1330, 360)">
      <text x="225" y="-2" text-anchor="middle" fill="#6b7280" font-weight="500" font-size="14" letter-spacing="1.2" dominant-baseline="hanging">SAMPLE 12 IMAGES</text>
      <!-- 行1 -->
      <g><rect x="0" y="20" width="80" height="80" rx="6" fill="#fef2f2" stroke="#e89a9a" stroke-width="2"/><text x="40" y="60" text-anchor="middle" dominant-baseline="central" fill="#b8413c" font-weight="700" font-size="36">×</text></g>
      <g transform="translate(90, 0)"><rect x="0" y="20" width="80" height="80" rx="6" fill="#e7f5ec" stroke="#a8d6b8" stroke-width="2"/><circle cx="40" cy="48" r="9" fill="#fcd590"/><polyline points="14,90 30,72 50,80 66,62 66,90" fill="#a8d6b8" stroke="none"/></g>
      <g transform="translate(180, 0)"><rect x="0" y="20" width="80" height="80" rx="6" fill="#e7f5ec" stroke="#a8d6b8" stroke-width="2"/><circle cx="40" cy="48" r="9" fill="#fcd590"/><polyline points="14,90 30,72 50,80 66,62 66,90" fill="#a8d6b8" stroke="none"/></g>
      <g transform="translate(270, 0)"><rect x="0" y="20" width="80" height="80" rx="6" fill="#fef2f2" stroke="#e89a9a" stroke-width="2"/><text x="40" y="60" text-anchor="middle" dominant-baseline="central" fill="#b8413c" font-weight="700" font-size="36">×</text></g>
      <g transform="translate(360, 0)"><rect x="0" y="20" width="80" height="80" rx="6" fill="#e7f5ec" stroke="#a8d6b8" stroke-width="2"/><circle cx="40" cy="48" r="9" fill="#fcd590"/><polyline points="14,90 30,72 50,80 66,62 66,90" fill="#a8d6b8" stroke="none"/></g>
      <!-- 行2 -->
      <g transform="translate(0, 90)"><rect x="0" y="20" width="80" height="80" rx="6" fill="#e7f5ec" stroke="#a8d6b8" stroke-width="2"/><circle cx="40" cy="48" r="9" fill="#fcd590"/><polyline points="14,90 30,72 50,80 66,62 66,90" fill="#a8d6b8" stroke="none"/></g>
      <g transform="translate(90, 90)"><rect x="0" y="20" width="80" height="80" rx="6" fill="#fef2f2" stroke="#e89a9a" stroke-width="2"/><text x="40" y="60" text-anchor="middle" dominant-baseline="central" fill="#b8413c" font-weight="700" font-size="36">×</text></g>
      <g transform="translate(180, 90)"><rect x="0" y="20" width="80" height="80" rx="6" fill="#e7f5ec" stroke="#a8d6b8" stroke-width="2"/><circle cx="40" cy="48" r="9" fill="#fcd590"/><polyline points="14,90 30,72 50,80 66,62 66,90" fill="#a8d6b8" stroke="none"/></g>
      <g transform="translate(270, 90)"><rect x="0" y="20" width="80" height="80" rx="6" fill="#e7f5ec" stroke="#a8d6b8" stroke-width="2"/><circle cx="40" cy="48" r="9" fill="#fcd590"/><polyline points="14,90 30,72 50,80 66,62 66,90" fill="#a8d6b8" stroke="none"/></g>
      <g transform="translate(360, 90)"><rect x="0" y="20" width="80" height="80" rx="6" fill="#fef2f2" stroke="#e89a9a" stroke-width="2"/><text x="40" y="60" text-anchor="middle" dominant-baseline="central" fill="#b8413c" font-weight="700" font-size="36">×</text></g>
    </g>

    <!-- 結果バー -->
    <rect x="1310" y="600" width="500" height="100" rx="10" fill="#fef2f2"/>
    <text x="1335" y="620" fill="#b8413c" font-weight="700" font-size="40" dominant-baseline="hanging">×</text>
    <text x="1380" y="624" fill="#1f2937" font-weight="700" font-size="22" dominant-baseline="hanging">3〜4割の画像が、すべてリンク切れ</text>
    <text x="1380" y="660" fill="#4b5563" font-weight="500" font-size="17" dominant-baseline="hanging">本番リリースした瞬間に、まとめて死ぬ</text>

    <!-- 救済 -->
    <rect x="1310" y="740" width="500" height="80" rx="10" fill="#fef3e2"/>
    <text x="1335" y="762" fill="#f59e0b" font-weight="600" font-size="18" letter-spacing="1.5" dominant-baseline="hanging">SAVED BY</text>
    <text x="1335" y="790" fill="#1f2937" font-weight="700" font-size="22" dominant-baseline="hanging">エラーで気づき、522件を一括書き換え</text>
  </g>

  <!-- フッター -->
  <g>
    <rect x="380" y="970" width="1160" height="56" rx="28" fill="#ffffff" stroke="#d8e7f2" stroke-width="1.5"/>
    <circle cx="414" cy="998" r="6" fill="#5da8d4"/>
    <text x="438" y="998" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="22" letter-spacing="0.8">ローカルのブラウザが、ネット越しに旧本番から画像を取ってきていただけだった</text>
  </g>
</svg>
